<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology & Physics Questions Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 2rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.15), transparent 400px);
            background-attachment: fixed;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .stats {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }

        #questions-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            letter-spacing: 0.02em;
        }

        .meta-group {
            display: flex;
            gap: 0.75rem;
        }

        .badge {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .chapter {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .tag-must {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .tag-should {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .q-number {
            color: var(--text-secondary);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.75rem;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            color: #ffffff;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 1.05rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: transparent;
            transition: background 0.2s ease;
        }

        .option:hover:not(.answered) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .option.correct {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: #a7f3d0;
        }

        .option.correct::before {
            background: var(--success);
        }

        .option.wrong {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: #fecaca;
        }

        .option.wrong::before {
            background: var(--error);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            display: none;
            color: #bfdbfe;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .explanation.visible {
            display: block;
            animation: expandDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .explanation-title {
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 2rem; }
            .question-card { padding: 1.5rem; }
            .meta-info { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        /* Tabs and Section Headers */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .section-header {
            margin: 2rem 0 1rem 0;
            padding: 1.5rem 2rem;
            background: rgba(30, 41, 59, 0.8);
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .section-header[data-section="biology"] {
            border-left-color: var(--success);
        }
        
        .section-header[data-section="physics"] {
            border-left-color: #f59e0b; /* Amber */
        }
        
        .section-header[data-section="chemistry"] {
            border-left-color: #ec4899; /* Pink */
        }

        .section-header h2 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .section-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Biology, Physics & Chemistry Mock Test</h1>
            <div class="stats" id="stats-display">Loading questions...</div>
            <div class="tabs">
                <button class="tab-btn active" data-target="all">All Questions</button>
                <button class="tab-btn" data-target="biology">Biology Section</button>
                <button class="tab-btn" data-target="physics">Physics Section</button>
                <button class="tab-btn" data-target="chemistry">Chemistry Section</button>
            </div>
            <div class="controls">
                <button class="btn" id="reveal-all">Reveal All Answers</button>
                <button class="btn btn-primary" id="reset-all">Reset All</button>
            </div>
        </header>

        <div id="questions-container">
            <!-- Questions will be injected here via JS -->
        </div>
    </div>

    <script>
        const bio_questions = [
        {"q":"Cell theory was proposed by:","o":["Darwin & Lamarck","Schleiden & Schwann","Virchow & Koch","Watson & Crick"],"a":1,"e":"Schleiden (1838) & Schwann (1839) proposed cell theory. Virchow added 'Omnis cellula e cellula'.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Who coined the term 'cell'?","o":["Robert Hooke","Leeuwenhoek","Robert Brown","Purkinje"],"a":0,"e":"Robert Hooke (1665) saw cork cells under microscope and named them 'cells'.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Powerhouse of cell is:","o":["Nucleus","Ribosome","Mitochondria","Golgi body"],"a":2,"e":"Mitochondria produces ATP via cellular respiration — hence called powerhouse.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Protein synthesis occurs at:","o":["Mitochondria","Ribosome","Lysosome","Centrosome"],"a":1,"e":"Ribosomes are site of protein synthesis (translation). Called 'factories of protein'.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Suicidal bag of cell is:","o":["Ribosome","Golgi body","Lysosome","Peroxisome"],"a":2,"e":"Lysosomes contain hydrolytic enzymes — called 'suicidal bags'. Can digest cell organelles.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Cell wall is absent in:","o":["Plant cells","Fungal cells","Animal cells","Bacterial cells"],"a":2,"e":"Animal cells lack cell wall. Only have plasma membrane.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Fluid mosaic model of plasma membrane was given by:","o":["Watson & Crick","Singer & Nicolson","Schleiden & Schwann","Robertson"],"a":1,"e":"Singer & Nicolson (1972) proposed fluid mosaic model of cell membrane.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Nucleus was discovered by:","o":["Robert Hooke","Robert Brown","Leeuwenhoek","Purkinje"],"a":1,"e":"Robert Brown (1831) discovered nucleus in orchid cells.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Which organelle is absent in prokaryotes?","o":["Ribosome","Cell wall","Nucleus","Plasma membrane"],"a":2,"e":"Prokaryotes lack membrane-bound nucleus. They have nucleoid instead.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Cristae are found in:","o":["Chloroplast","Mitochondria","Nucleus","ER"],"a":1,"e":"Cristae are shelf-like projections of inner mitochondrial membrane where ATP synthesis occurs.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Grana are found in:","o":["Mitochondria","Ribosome","Chloroplast","Golgi body"],"a":2,"e":"Grana are stacks of thylakoids in chloroplast where light reactions of photosynthesis occur.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"The 70S ribosomes are found in:","o":["Animal cells","Plant cells","Prokaryotes","Fungi"],"a":2,"e":"70S ribosomes (50S+30S) are in prokaryotes. Eukaryotes have 80S (60S+40S) ribosomes.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Tonoplast is the membrane of:","o":["Nucleus","Chloroplast","Vacuole","Mitochondria"],"a":2,"e":"Tonoplast is membrane surrounding central vacuole in plant cells.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Kitchen of the cell:","o":["Mitochondria","Ribosome","Chloroplast","Nucleus"],"a":2,"e":"Chloroplast prepares food via photosynthesis — called kitchen of cell.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Longest cell in human body:","o":["Liver cell","Nerve cell","RBC","Muscle cell"],"a":1,"e":"Nerve cells (neurons) can be over 1 meter long.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"S-phase of cell cycle involves:","o":["Cell growth","DNA replication","Nuclear division","Cytokinesis"],"a":1,"e":"S (Synthesis) phase = DNA replication. G1=growth, G2=preparation, M=mitosis.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Meiosis results in:","o":["2 diploid cells","4 diploid cells","2 haploid cells","4 haploid cells"],"a":3,"e":"Meiosis produces 4 genetically different haploid cells (gametes).","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Crossing over occurs during:","o":["Leptotene","Zygotene","Pachytene","Diplotene"],"a":2,"e":"Crossing over (exchange between homologous chromosomes) occurs during Pachytene.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Chromosomes are made up of:","o":["DNA only","RNA only","DNA and protein","RNA and protein"],"a":2,"e":"Chromosomes = DNA + histone proteins (chromatin).","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Nucleolus is site of synthesis of:","o":["DNA","mRNA","rRNA","tRNA"],"a":2,"e":"Nucleolus synthesizes rRNA. Ribosomes are assembled here.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Osmosis is movement of water from:","o":["High solute to low solute","Low solute to high solute","High conc to low conc","None"],"a":1,"e":"Water moves by osmosis from low solute (high water potential) to high solute concentration.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Cell plate is formed during:","o":["Prophase","Metaphase","Anaphase","Telophase"],"a":3,"e":"Cell plate forms during cytokinesis in telophase in plant cells.","ch":"Cell Biology","tag":"Should Do"},
        {"q":"Which organelle is self-replicating?","o":["Ribosome","Golgi body","Mitochondria","Lysosome"],"a":2,"e":"Mitochondria have own DNA and ribosomes — can self-replicate.","ch":"Cell Biology","tag":"Should Do"},
        {"q":"Nucleosome is made of:","o":["DNA only","DNA + 8 histones","RNA + proteins","Lipids"],"a":1,"e":"Nucleosome = 147 bp DNA wrapped around 8 histone proteins (octamer).","ch":"Molecular Biology","tag":"Must Do"},
        {"q":"Phagocytosis means:","o":["Taking in liquid","Taking in large solid particles","Expelling waste","Diffusion"],"a":1,"e":"Phagocytosis = engulfing solid particles (cell eating). Pinocytosis = engulfing liquid.","ch":"Cell Biology","tag":"Must Do"},
        {"q":"Peptide bond links:","o":["Nucleotides","Amino acids","Sugars","Fatty acids"],"a":1,"e":"Peptide bond (-CO-NH-) links amino acids together to form proteins.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Which is a disaccharide?","o":["Glucose","Sucrose","Starch","Cellulose"],"a":1,"e":"Sucrose = glucose + fructose. Lactose = glucose + galactose. Maltose = glucose + glucose.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Enzyme is a:","o":["Lipid","Carbohydrate","Protein","Nucleic acid"],"a":2,"e":"Enzymes are biological catalysts (proteins). Exception: ribozymes (RNA catalysts).","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Which base is present in RNA but not DNA?","o":["Adenine","Guanine","Thymine","Uracil"],"a":3,"e":"RNA has Uracil instead of Thymine. DNA=AGCT, RNA=AGCU.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Chargaff's rule states:","o":["A=G, T=C","A=T, G=C","A=C, T=G","All equal"],"a":1,"e":"Chargaff's rule: A=T (2 H-bonds), G=C (3 H-bonds).","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Glycogen is storage polysaccharide in:","o":["Plants","Fungi","Animals","Bacteria"],"a":2,"e":"Glycogen (animal starch) stored in liver and muscles. Plants store starch.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Which vitamin is water soluble?","o":["Vitamin A","Vitamin D","Vitamin C","Vitamin K"],"a":2,"e":"Vitamins B and C are water soluble. A, D, E, K are fat soluble.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Reducing sugar test is done with:","o":["Iodine","Benedict's/Fehling's solution","Biuret reagent","Sudan III"],"a":1,"e":"Reducing sugars (glucose, fructose) reduce Benedict's/Fehling's → brick-red precipitate.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Iodine test is positive for:","o":["Protein","Fat","Starch","Reducing sugar"],"a":2,"e":"Iodine gives blue-black color with starch (amylose). Used as starch test.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Biuret test is used for:","o":["Starch","Proteins","Fats","Nucleic acids"],"a":1,"e":"Biuret test: purple/violet color with proteins (detects peptide bonds).","ch":"Biomolecules","tag":"Must Do"},
        {"q":"ATP is a:","o":["Lipid","Nucleotide","Protein","Carbohydrate"],"a":1,"e":"ATP = Adenosine Triphosphate — nucleotide with adenine + ribose + 3 phosphates.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Which nucleotide base is a purine?","o":["Thymine","Cytosine","Uracil","Adenine"],"a":3,"e":"Purines (double ring) = Adenine & Guanine. Pyrimidines (single ring) = C, T, U.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Denaturation of protein:","o":["Destroys primary structure","Disrupts secondary & tertiary structure","Breaks peptide bonds","Removes amino acids"],"a":1,"e":"Denaturation = unfolding. 2° and 3° structures lost. Primary (amino acid sequence) unchanged.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Essential amino acids:","o":["Synthesized by body","Must be taken in diet","Found only in plants","All amino acids"],"a":1,"e":"Essential amino acids (8 in adults) cannot be synthesized by body — must come from food.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Secondary structure of protein is maintained by:","o":["Peptide bonds","Hydrogen bonds","Disulfide bonds","Ionic bonds"],"a":1,"e":"Secondary structure (alpha helix, beta sheet) = hydrogen bonds between peptide groups.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Cellulose is:","o":["Energy storage in plants","Structural in plant cell wall","Energy in animals","Enzyme"],"a":1,"e":"Cellulose is structural polysaccharide in plant cell wall. Cannot be digested by humans.","ch":"Biomolecules","tag":"Must Do"},
        {"q":"Km value of enzyme represents:","o":["Maximum velocity","Substrate conc at half Vmax","Temperature optimum","pH optimum"],"a":1,"e":"Km = substrate concentration at Vmax/2. Lower Km = higher substrate affinity.","ch":"Biomolecules","tag":"Should Do"},
        {"q":"Cholesterol belongs to:","o":["Fats","Phospholipids","Steroids","Waxes"],"a":2,"e":"Cholesterol is steroid — precursor of hormones (testosterone, estrogen, cortisol, bile acids).","ch":"Biomolecules","tag":"Should Do"},
        {"q":"Amphibians of plant kingdom:","o":["Algae","Bryophytes","Pteridophytes","Gymnosperms"],"a":1,"e":"Bryophytes (mosses) called amphibians — need water for fertilization but live on land.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Xylem and phloem first found in:","o":["Bryophyta","Thallophyta","Pteridophyta","Gymnospermae"],"a":2,"e":"Pteridophytes are first vascular plants — have xylem and phloem.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Seeds are produced in:","o":["Algae","Mosses","Ferns","Gymnosperms & Angiosperms"],"a":3,"e":"Spermatophytes (Gymnosperms + Angiosperms) produce seeds.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Funaria is a:","o":["Alga","Liverwort","Moss","Fern"],"a":2,"e":"Funaria (bog moss) is example of Bryophyta class Musci (mosses).","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Pinus belongs to:","o":["Angiosperms","Gymnosperms","Pteridophytes","Bryophytes"],"a":1,"e":"Pinus (pine) is gymnosperm — naked seeds not enclosed in fruit.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Biofertilizer alga:","o":["Spirogyra","Ulva","Anabaena","Chara"],"a":2,"e":"Anabaena (cyanobacterium) fixes nitrogen — used as biofertilizer in rice fields.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"'Agar agar' is obtained from:","o":["Brown algae","Red algae","Green algae","Blue-green algae"],"a":1,"e":"Agar from red algae (Gracilaria, Gelidium). Used in microbiological culture media.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Double fertilization occurs in:","o":["Gymnosperms","Angiosperms","Pteridophytes","Bryophytes"],"a":1,"e":"Double fertilization unique to angiosperms: one sperm+egg=zygote; other+2 polar nuclei=endosperm.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Which is monocot?","o":["Pea","Mango","Wheat","Mustard"],"a":2,"e":"Wheat, rice, maize, onion = monocots. Pea, mango, mustard = dicots.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"First land plants were:","o":["Angiosperms","Gymnosperms","Bryophytes","Pteridophytes"],"a":2,"e":"Bryophytes were first plants to colonize land from aquatic environment.","ch":"Plant Kingdom","tag":"Must Do"},
        {"q":"Flame cells are excretory organs in:","o":["Earthworm","Cockroach","Planaria","Hydra"],"a":2,"e":"Flame cells (protonephridia) in Platyhelminthes like Planaria.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Water vascular system found in:","o":["Arthropoda","Echinodermata","Mollusca","Annelida"],"a":1,"e":"Water vascular system unique to Echinodermata — used for locomotion and feeding.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Malpighian tubules are excretory organs of:","o":["Earthworm","Cockroach","Planaria","Starfish"],"a":1,"e":"Malpighian tubules = excretory organs of insects (Arthropoda).","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Nematocysts found in:","o":["Sponges","Cnidaria","Platyhelminthes","Annelida"],"a":1,"e":"Nematocysts = stinging cells unique to Cnidaria. Used for prey capture and defense.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Crocodile has:","o":["2-chambered heart","3-chambered heart","4-chambered heart","No heart"],"a":2,"e":"Crocodile is only reptile with 4-chambered heart. Other reptiles have 3-chambered.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Largest phylum in animal kingdom:","o":["Chordata","Mollusca","Arthropoda","Annelida"],"a":2,"e":"Arthropoda (~75% of all animal species) — insects, crustaceans, arachnids.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Mammary glands are modified:","o":["Sweat glands","Sebaceous glands","Tear glands","Salivary glands"],"a":0,"e":"Mammary glands are modified sweat glands — secrete milk.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Hermaphrodites have:","o":["Asexual reproduction","Both male & female organs","Change sex","Budding"],"a":1,"e":"Hermaphrodites have both male and female reproductive organs e.g. earthworm, tapeworm, leech.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Setae help locomotion in:","o":["Insects","Earthworm","Starfish","Hydra"],"a":1,"e":"Setae are chitinous bristles in earthworm helping locomotion by gripping soil.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Open circulatory system found in:","o":["Earthworm","Cockroach","Human","Frog"],"a":1,"e":"Cockroach (insects) have open circulatory system — blood bathes organs directly.","ch":"Animal Kingdom","tag":"Must Do"},
        {"q":"Salivary amylase digests:","o":["Proteins","Fats","Starch","Cellulose"],"a":2,"e":"Salivary amylase (ptyalin) converts starch → maltose. Carb digestion begins in mouth.","ch":"Digestion","tag":"Must Do"},
        {"q":"Bile is produced by:","o":["Pancreas","Liver","Gallbladder","Small intestine"],"a":1,"e":"Bile produced by liver, stored in gallbladder. Emulsifies fats (no enzymes in bile).","ch":"Digestion","tag":"Must Do"},
        {"q":"Trypsin is secreted by:","o":["Liver","Stomach","Pancreas","Intestine"],"a":2,"e":"Trypsin, chymotrypsin, pancreatic lipase secreted by pancreas into small intestine.","ch":"Digestion","tag":"Must Do"},
        {"q":"Absorption mainly occurs in:","o":["Stomach","Large intestine","Small intestine","Esophagus"],"a":2,"e":"Small intestine (jejunum + ileum) is main site of nutrient absorption. Villi increase surface area.","ch":"Digestion","tag":"Must Do"},
        {"q":"pH of gastric juice is approximately:","o":["7","8","2","5"],"a":2,"e":"Gastric juice is highly acidic (pH ~2) due to HCl. Activates pepsinogen to pepsin.","ch":"Digestion","tag":"Must Do"},
        {"q":"Fat absorption occurs through:","o":["Blood capillaries","Lacteals","Hepatic portal vein","Arteries"],"a":1,"e":"Fatty acids and glycerol absorbed into lacteals (lymph capillaries) in villi → lymph → blood.","ch":"Digestion","tag":"Must Do"},
        {"q":"Enterokinase activates:","o":["Pepsinogen","Trypsinogen","Chymotrypsinogen","Procarboxypeptidase"],"a":1,"e":"Enterokinase (intestinal) converts trypsinogen → trypsin, which activates other proenzymes.","ch":"Digestion","tag":"Must Do"},
        {"q":"Kwashiorkor is caused by deficiency of:","o":["Carbohydrates","Proteins","Fats","Minerals"],"a":1,"e":"Kwashiorkor = protein deficiency. Marasmus = both protein + calorie deficiency.","ch":"Digestion","tag":"Must Do"},
        {"q":"Villi are projections in:","o":["Stomach lining","Small intestine","Large intestine","Esophagus"],"a":1,"e":"Villi = finger-like projections in small intestine increasing surface area for absorption.","ch":"Digestion","tag":"Must Do"},
        {"q":"Portal vein carries blood from:","o":["Heart to liver","Gut to liver","Liver to heart","Kidney"],"a":1,"e":"Hepatic portal vein carries nutrient-rich blood from intestines to liver.","ch":"Digestion","tag":"Must Do"},
        {"q":"Vitamin B12 absorption requires:","o":["Bile salts","Intrinsic factor","Pepsin","HCl"],"a":1,"e":"Vitamin B12 needs intrinsic factor (gastric parietal cells). Deficiency = pernicious anemia.","ch":"Digestion","tag":"Must Do"},
        {"q":"Jaundice caused by:","o":["Excess glucose","Excess bilirubin in blood","Lack of RBC","Kidney failure"],"a":1,"e":"Jaundice = yellowing of skin/eyes due to excess bilirubin (from RBC breakdown) in blood.","ch":"Digestion","tag":"Must Do"},
        {"q":"Appendix is part of:","o":["Small intestine","Large intestine","Stomach","Liver"],"a":1,"e":"Appendix (vermiform) is vestigial organ attached to cecum (start of large intestine).","ch":"Digestion","tag":"Must Do"},
        {"q":"Rennin is found in:","o":["Adults","Infants","Elderly","All ages"],"a":1,"e":"Rennin (chymosin) in gastric juice of infants — coagulates milk protein (casein).","ch":"Digestion","tag":"Must Do"},
        {"q":"Iron absorption is increased by:","o":["Vitamin C","Vitamin D","Calcium","Tannins"],"a":0,"e":"Vitamin C reduces Fe3+ to Fe2+ which is better absorbed. Tannins (tea) reduce absorption.","ch":"Digestion","tag":"Must Do"},
        {"q":"Normal breathing rate in adults:","o":["6-8/min","12-16/min","20-25/min","30-35/min"],"a":1,"e":"Normal respiratory rate = 12-16 breaths per minute in healthy adults.","ch":"Breathing","tag":"Must Do"},
        {"q":"Tidal volume is approximately:","o":["200 mL","500 mL","1000 mL","3000 mL"],"a":1,"e":"Tidal Volume (TV) = ~500mL — air in a normal quiet breath.","ch":"Breathing","tag":"Must Do"},
        {"q":"Vital capacity = :","o":["TV+IRV+ERV","Total lung volume","Residual volume","TV only"],"a":0,"e":"VC = TV(500)+IRV(3000)+ERV(1100) = ~4600mL. Max air breathed out after max inspiration.","ch":"Breathing","tag":"Must Do"},
        {"q":"CO2 transported mainly as:","o":["Dissolved in plasma","Carbaminohemoglobin","Bicarbonate (HCO3-)","Equal all"],"a":2,"e":"CO2 transport: 70% as HCO3-, 20% carbaminohemoglobin, 10% dissolved in plasma.","ch":"Breathing","tag":"Must Do"},
        {"q":"Respiratory center is in:","o":["Cerebrum","Cerebellum","Medulla oblongata","Hypothalamus"],"a":2,"e":"Respiratory rhythmicity center is in medulla oblongata.","ch":"Breathing","tag":"Must Do"},
        {"q":"Bohr's effect means:","o":["O2 loading at high pH","Hb O2 affinity decreases at high CO2/low pH","CO2 solubility","None"],"a":1,"e":"Bohr effect: high CO2/low pH → reduced Hb O2 affinity → promotes O2 release to tissues.","ch":"Breathing","tag":"Should Do"},
        {"q":"Asthma is caused by:","o":["Bacterial infection","Bronchospasm (narrowing of bronchioles)","Viral infection","Alveolar damage"],"a":1,"e":"Asthma = narrowing of bronchioles causing wheezing and breathlessness.","ch":"Breathing","tag":"Must Do"},
        {"q":"Emphysema:","o":["Excess mucus","Destruction of alveolar walls","Fluid in lungs","Collapsed lung"],"a":1,"e":"Emphysema = progressive destruction of alveolar walls → reduced gas exchange surface.","ch":"Breathing","tag":"Must Do"},
        {"q":"Right lung has how many lobes?","o":["2","3","4","1"],"a":1,"e":"Right lung = 3 lobes. Left lung = 2 lobes (cardiac notch accommodates heart).","ch":"Breathing","tag":"Must Do"},
        {"q":"Carboxyhemoglobin is formed by:","o":["CO2 + Hb","CO + Hb","O2 + Hb","N2 + Hb"],"a":1,"e":"CO binds Hb 200x more than O2 → carboxyhemoglobin → blocks O2 transport. Deadly.","ch":"Breathing","tag":"Must Do"},
        {"q":"Alveolar surface area in humans:","o":["10 sq m","50 sq m","70 sq m","200 sq m"],"a":2,"e":"Total alveolar surface ≈ 70 sq m (tennis court size) — massive area for gas exchange.","ch":"Breathing","tag":"Should Do"},
        {"q":"Trachea is kept open by:","o":["Smooth muscle","Cartilaginous rings","Elastic fibers","Fibrous tissue"],"a":1,"e":"C-shaped cartilaginous rings keep trachea permanently open for air passage.","ch":"Breathing","tag":"Must Do"},
        {"q":"Silicosis caused by:","o":["Asbestos dust","Silica dust","Coal dust","Cotton dust"],"a":1,"e":"Silicosis = lung fibrosis from prolonged silica dust inhalation (miners, stone cutters).","ch":"Breathing","tag":"Must Do"},
        {"q":"Diaphragm contracting causes:","o":["Expiration","Inspiration","No effect","Reduced volume"],"a":1,"e":"Inspiration: diaphragm contracts (flattens) → increases thoracic volume → air enters.","ch":"Breathing","tag":"Must Do"},
        {"q":"Surfactant is produced by:","o":["Type I pneumocytes","Type II pneumocytes","Bronchial cells","Macrophages"],"a":1,"e":"Surfactant (DPPC) from Type II alveolar cells — prevents alveolar collapse.","ch":"Breathing","tag":"Should Do"},
        {"q":"Normal blood pressure:","o":["80/120","120/80","100/60","140/90"],"a":1,"e":"Normal BP = 120/80 mmHg (systolic/diastolic).","ch":"Circulation","tag":"Must Do"},
        {"q":"Universal blood donor:","o":["AB","A","B","O"],"a":3,"e":"O is universal donor (no antigens). AB is universal recipient (no antibodies).","ch":"Circulation","tag":"Must Do"},
        {"q":"Pacemaker of heart:","o":["Pacemaker","AV node","SA node","Bundle of His"],"a":2,"e":"SA node (sinoatrial node) in right atrium generates impulse. Called pacemaker.","ch":"Circulation","tag":"Must Do"},
        {"q":"Cardiac output = :","o":["HR × BP","HR × Stroke volume","Stroke volume only","BP only"],"a":1,"e":"CO = HR (72/min) × SV (70mL) = ~5040 mL/min ≈ 5L/min.","ch":"Circulation","tag":"Must Do"},
        {"q":"Heart sounds Lub-Dub due to:","o":["Heart muscle","Closure of valves","Blood flow","Atrial contraction"],"a":1,"e":"Lub (S1) = AV valve closure. Dub (S2) = semilunar valve closure.","ch":"Circulation","tag":"Must Do"},
        {"q":"Platelets help in:","o":["Immunity","Blood clotting","O2 transport","CO2 transport"],"a":1,"e":"Platelets (thrombocytes) help in hemostasis (blood clotting). Count: 1.5-4 lakh/µL.","ch":"Circulation","tag":"Must Do"},
        {"q":"Rh factor and erythroblastosis fetalis:","o":["ABO blood group","Rh- mother with Rh+ baby","Rh+ mother Rh- baby","ABO incompatibility"],"a":1,"e":"Erythroblastosis fetalis: Rh- mother sensitized by Rh+ fetal blood → attacks next Rh+ fetus.","ch":"Circulation","tag":"Must Do"},
        {"q":"Which WBC produces antibodies?","o":["Neutrophils","Monocytes","B-lymphocytes","Eosinophils"],"a":2,"e":"B-lymphocytes → plasma cells → produce antibodies (immunoglobulins).","ch":"Circulation","tag":"Must Do"},
        {"q":"Hemophilia is due to deficiency of:","o":["Platelets","Clotting factor VIII or IX","Vitamin K","Iron"],"a":1,"e":"Hemophilia A = factor VIII deficiency. Hemophilia B = factor IX. X-linked recessive.","ch":"Circulation","tag":"Must Do"},
        {"q":"RBC lifespan:","o":["30 days","90 days","120 days","365 days"],"a":2,"e":"RBC lifespan = 120 days. Destroyed in spleen (graveyard of RBC).","ch":"Circulation","tag":"Must Do"},
        {"q":"Normal RBC count in males:","o":["2-3 million/µL","4.5-5.5 million/µL","7-8 million/µL","1 million/µL"],"a":1,"e":"Normal RBC: Males = 4.5-5.5 million/µL. Females = 4.0-5.0 million/µL.","ch":"Circulation","tag":"Must Do"},
        {"q":"Anemia caused by:","o":["Excess RBC","Low hemoglobin/RBC","Excess WBC","Excess platelets"],"a":1,"e":"Anemia = reduced Hb or RBC count → reduced O2 carrying capacity.","ch":"Circulation","tag":"Must Do"},
        {"q":"Leukemia is cancer of:","o":["RBC","Platelets","WBC","Plasma"],"a":2,"e":"Leukemia = cancer of WBC — uncontrolled proliferation of leukocytes.","ch":"Circulation","tag":"Must Do"},
        {"q":"Spleen is called 'graveyard of RBC' because:","o":["RBC made here","Old RBC destroyed here","RBC stored here","RBC repaired"],"a":1,"e":"Spleen destroys old RBCs after 120 days and recycles iron from hemoglobin.","ch":"Circulation","tag":"Must Do"},
        {"q":"Largest artery in body:","o":["Pulmonary artery","Coronary artery","Aorta","Carotid artery"],"a":2,"e":"Aorta is largest artery (~2.5cm) — carries oxygenated blood from left ventricle to body.","ch":"Circulation","tag":"Must Do"},
        {"q":"AV valves of heart:","o":["Aortic and pulmonary","Mitral and tricuspid","Mitral and aortic","Tricuspid and pulmonary"],"a":1,"e":"AV valves: Mitral (bicuspid, left) + Tricuspid (right). Prevent backflow ventricle→atria.","ch":"Circulation","tag":"Must Do"},
        {"q":"Functional unit of kidney:","o":["Ureter","Nephron","Urethra","Glomerulus"],"a":1,"e":"Nephron is structural and functional unit. Each kidney has ~1 million nephrons.","ch":"Excretion","tag":"Must Do"},

        {"q":"Main nitrogenous waste in humans:","o":["Ammonia","Urea","Uric acid","Creatinine"],"a":1,"e":"Humans are ureotelic — urea is main waste (less toxic, water soluble).","ch":"Excretion","tag":"Must Do"},
        {"q":"Urea is synthesized in:","o":["Kidney","Liver","Spleen","Intestine"],"a":1,"e":"Urea produced in liver via ornithine (urea) cycle from NH3 + CO2.","ch":"Excretion","tag":"Must Do"},
        {"q":"ADH acts on:","o":["Glomerulus","Proximal tubule","Distal tubule & collecting duct","Loop of Henle"],"a":2,"e":"ADH promotes water reabsorption in distal tubule and collecting duct → concentrated urine.","ch":"Excretion","tag":"Must Do"},
        {"q":"Renin secreted by:","o":["Adrenal cortex","JG cells of kidney","Posterior pituitary","Liver"],"a":1,"e":"Renin from JG (juxtaglomerular) cells in response to low BP → RAAS → aldosterone.","ch":"Excretion","tag":"Must Do"},
        {"q":"Glucose in urine indicates:","o":["Normal","Diabetes mellitus","Kidney stone","UTI"],"a":1,"e":"Glucosuria = glucose in urine. Indicates diabetes mellitus (blood glucose exceeds renal threshold).","ch":"Excretion","tag":"Must Do"},
        {"q":"Gout caused by excess:","o":["Urea","Uric acid","Creatinine","Ammonia"],"a":1,"e":"Gout = hyperuricemia → uric acid deposits in joints (especially big toe).","ch":"Excretion","tag":"Must Do"},
        {"q":"Bowman's capsule surrounds:","o":["Loop of Henle","Glomerulus","Distal tubule","Collecting duct"],"a":1,"e":"Bowman's capsule = cup-shaped structure around glomerulus. Receives filtrate.","ch":"Excretion","tag":"Must Do"},
        {"q":"Aldosterone promotes:","o":["K+ reabsorption","Na+ reabsorption in DCT (increases BP)","Water loss","ADH release"],"a":1,"e":"Aldosterone (adrenal cortex) promotes Na+ reabsorption → water retention → raised BP.","ch":"Excretion","tag":"Must Do"},
        {"q":"Dialysis is done when:","o":["Liver fails","Kidneys fail","Heart fails","Lungs fail"],"a":1,"e":"Hemodialysis in kidney failure — machine filters blood (artificial kidney).","ch":"Excretion","tag":"Must Do"},
        {"q":"Uremia is:","o":["High blood urea","Low blood urea","Blood in urine","Glucose in urine"],"a":0,"e":"Uremia = abnormally high urea in blood due to kidney failure.","ch":"Excretion","tag":"Must Do"},
        {"q":"Cystitis is inflammation of:","o":["Kidney","Ureter","Urinary bladder","Urethra"],"a":2,"e":"Cystitis = urinary bladder infection. More common in females (shorter urethra).","ch":"Excretion","tag":"Must Do"},

        {"q":"Synapse is junction between:","o":["Two muscles","Two neurons","Nerve and bone","Two bones"],"a":1,"e":"Synapse = junction between two neurons. Nerve impulse transmitted via neurotransmitters.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Acetylcholine is a:","o":["Enzyme","Hormone","Neurotransmitter","Vitamin"],"a":2,"e":"Acetylcholine is major neurotransmitter at NMJ and parasympathetic nervous system.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Cerebrum controls:","o":["Balance","Breathing","Voluntary actions, intelligence, memory","Heartbeat"],"a":2,"e":"Cerebrum controls voluntary movements, intelligence, memory, consciousness.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Cerebellum controls:","o":["Intelligence","Balance and coordination","Breathing","Heartbeat"],"a":1,"e":"Cerebellum coordinates muscular movements and maintains posture and balance.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Hypothalamus regulates:","o":["Vision","Temperature, hunger, thirst, sleep","Hearing","Balance"],"a":1,"e":"Hypothalamus regulates body temperature, hunger, thirst, sleep and controls pituitary gland.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Reflex arc involves:","o":["Brain only","Spinal cord+brain","Receptor→afferent→spinal cord→efferent→effector","Muscles only"],"a":2,"e":"Reflex arc bypasses brain — fast automatic response via spinal cord.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Myelin sheath speeds up nerve impulse in:","o":["Unmyelinated nerves","Myelinated nerves (saltatory conduction)","All nerves","Smooth muscle"],"a":1,"e":"Myelin sheath — impulse jumps between nodes of Ranvier (saltatory conduction) — faster transmission.","ch":"Neural Control","tag":"Must Do"},

        {"q":"Alzheimer's involves:","o":["Excess dopamine","Amyloid plaques + loss of acetylcholine neurons","Myelin damage","Excess serotonin"],"a":1,"e":"Alzheimer's = amyloid beta plaques + tau tangles + loss of cholinergic neurons → memory loss.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Meninges are:","o":["Brain cells","Three membranes covering brain & spinal cord","Brain blood vessels","Neurons"],"a":1,"e":"Meninges = Dura mater (outer) + Arachnoid (middle) + Pia mater (inner).","ch":"Neural Control","tag":"Must Do"},
        {"q":"Resting membrane potential of neuron:","o":["0 mV","-70 mV","+70 mV","-40 mV"],"a":1,"e":"Resting membrane potential ≈ -70 mV (inside negative) due to Na+/K+ ATPase pump.","ch":"Neural Control","tag":"Should Do"},

        {"q":"Which lobe contains visual area?","o":["Frontal","Temporal","Parietal","Occipital"],"a":3,"e":"Occipital lobe = visual cortex. Temporal = auditory. Frontal = motor. Parietal = sensory.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Corpus callosum connects:","o":["Two cerebral hemispheres","Cerebrum+cerebellum","Brain+spinal cord","None"],"a":0,"e":"Corpus callosum = band of white matter connecting left and right cerebral hemispheres.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Epilepsy caused by:","o":["Insufficient blood","Abnormal electrical discharges in brain","Meningitis","Myelin damage"],"a":1,"e":"Epilepsy = recurrent seizures due to abnormal neuronal discharges in brain.","ch":"Neural Control","tag":"Must Do"},
        {"q":"Master gland is:","o":["Thyroid","Adrenal","Pituitary","Hypothalamus"],"a":2,"e":"Pituitary gland is called master gland — controls other endocrine glands via trophic hormones.","ch":"Hormones","tag":"Must Do"},
        {"q":"Insulin secreted by:","o":["Alpha cells","Beta cells of islets of Langerhans","Delta cells","Liver"],"a":1,"e":"Insulin by Beta (β) cells of islets of Langerhans. Lowers blood glucose.","ch":"Hormones","tag":"Must Do"},
        {"q":"Glucagon secreted by:","o":["Alpha cells","Beta cells","Delta cells","Liver"],"a":0,"e":"Glucagon from Alpha (α) cells. Raises blood glucose (glycogenolysis).","ch":"Hormones","tag":"Must Do"},
        {"q":"Adrenaline secreted by:","o":["Adrenal cortex","Adrenal medulla","Thyroid","Pituitary"],"a":1,"e":"Adrenaline (epinephrine) from adrenal medulla. Fight-or-flight hormone.","ch":"Hormones","tag":"Must Do"},
        {"q":"Thyroid hormone requires:","o":["Calcium","Iron","Iodine","Zinc"],"a":2,"e":"Thyroid hormones (T3, T4) require iodine. Deficiency → goiter. Cretinism in children.","ch":"Hormones","tag":"Must Do"},
        {"q":"Diabetes insipidus caused by:","o":["Insulin deficiency","ADH deficiency","Glucagon excess","Cortisol deficiency"],"a":1,"e":"Diabetes insipidus = ADH (vasopressin) deficiency → can't concentrate urine → extreme thirst.","ch":"Hormones","tag":"Must Do"},
        {"q":"Oxytocin released from:","o":["Anterior pituitary","Posterior pituitary","Ovary","Uterus"],"a":1,"e":"Oxytocin (posterior pituitary) causes uterine contractions during labor and milk ejection.","ch":"Hormones","tag":"Must Do"},
        {"q":"Cretinism caused by:","o":["Excess thyroid in adults","Thyroid deficiency in children","Excess insulin","GH deficiency"],"a":1,"e":"Cretinism = childhood hypothyroidism → stunted physical and mental growth.","ch":"Hormones","tag":"Must Do"},
        {"q":"Acromegaly caused by:","o":["Excess GH in adults","GH deficiency in children","Excess thyroid","Excess insulin"],"a":0,"e":"Acromegaly = excess GH in adults → enlarged hands, feet, face. Gigantism if in children.","ch":"Hormones","tag":"Must Do"},
        {"q":"Addison's disease:","o":["Excess cortisol","Adrenocortical hormone deficiency","Excess adrenaline","Insulin deficiency"],"a":1,"e":"Addison's = hyposecretion of adrenal cortical hormones → weakness, hypotension.","ch":"Hormones","tag":"Must Do"},
        {"q":"Cushing's syndrome:","o":["Excess cortisol","Cortisol deficiency","Excess insulin","Aldosterone deficiency"],"a":0,"e":"Cushing's = hypercortisolism → moon face, buffalo hump, central obesity, hypertension.","ch":"Hormones","tag":"Must Do"},
        {"q":"Prolactin stimulates:","o":["Ovulation","Milk production","Uterine contraction","Bone growth"],"a":1,"e":"Prolactin (PRL, anterior pituitary) stimulates milk production (lactogenesis).","ch":"Hormones","tag":"Must Do"},
        {"q":"Testosterone produced by:","o":["Adrenal gland","Leydig cells of testis","Sertoli cells","Anterior pituitary"],"a":1,"e":"Testosterone from Leydig (interstitial) cells of testis under LH stimulation.","ch":"Hormones","tag":"Must Do"},
        {"q":"Melatonin secreted by:","o":["Pineal gland","Thymus","Hypothalamus","Pituitary"],"a":0,"e":"Melatonin from pineal gland regulates circadian rhythm. Increases at night.","ch":"Hormones","tag":"Must Do"},
        {"q":"Which is a steroid hormone?","o":["Insulin","Adrenaline","Cortisol","GH"],"a":2,"e":"Cortisol (and all adrenocortical + sex hormones) are steroid — derived from cholesterol.","ch":"Hormones","tag":"Must Do"},
        {"q":"Graves' disease:","o":["Hypothyroidism","Autoimmune hyperthyroidism","Iodine deficiency","Excess cortisol"],"a":1,"e":"Graves' disease = autoimmune hyperthyroidism → exophthalmos, goiter.","ch":"Hormones","tag":"Must Do"},
        {"q":"Second messenger in hormone action:","o":["Hormone itself","cAMP","RNA","Protein"],"a":1,"e":"cAMP (cyclic AMP) is second messenger for many peptide hormones (adrenaline, glucagon).","ch":"Hormones","tag":"Should Do"},
        {"q":"Thyroxine controls metamorphosis in:","o":["Insects","Frogs","Fishes","Birds"],"a":1,"e":"Thyroxine controls metamorphosis in amphibians (tadpole → frog).","ch":"Hormones","tag":"Must Do"},
        {"q":"Fertilization in humans occurs in:","o":["Uterus","Ovary","Fallopian tube","Cervix"],"a":2,"e":"Fertilization occurs in ampullary region of fallopian tube (oviduct).","ch":"Reproduction","tag":"Must Do"},
        {"q":"Human gestation period:","o":["6 months","9 months (38-40 weeks)","12 months","3 months"],"a":1,"e":"Human gestation ≈ 280 days (40 weeks, ~9 months) from last menstrual period.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Corpus luteum secretes:","o":["Estrogen only","Progesterone + estrogen","FSH","LH"],"a":1,"e":"Corpus luteum (from ruptured follicle) secretes progesterone + estrogen to maintain pregnancy.","ch":"Reproduction","tag":"Must Do"},
        {"q":"hCG is produced by:","o":["Anterior pituitary","Corpus luteum","Placenta (trophoblast)","Ovary"],"a":2,"e":"hCG by trophoblast of placenta. Detected in pregnancy tests. Maintains corpus luteum.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Vasectomy involves cutting of:","o":["Urethra","Vas deferens","Epididymis","Seminal vesicle"],"a":1,"e":"Vasectomy = male sterilization — vas deferens cut and tied.","ch":"Reproduction","tag":"Must Do"},
        {"q":"IVF stands for:","o":["In Vivo Fertilization","In Vitro Fertilization","Internal Vaccination","Inverted Vascular Filtration"],"a":1,"e":"IVF = egg fertilized in lab, embryo transferred to uterus (test tube baby).","ch":"Reproduction","tag":"Must Do"},
        {"q":"Menstrual cycle length:","o":["14 days","21 days","28 days","35 days"],"a":2,"e":"Normal menstrual cycle = 28 days. Ovulation on day 14. Menstruation days 1-5.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Blastocyst implants in:","o":["Fallopian tube","Cervix","Uterine wall (endometrium)","Ovary"],"a":2,"e":"Blastocyst implants in endometrium at ~day 6-7 after fertilization.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Amniocentesis used for:","o":["Treating infertility","Detecting chromosomal disorders in fetus","Contraception","Abortion"],"a":1,"e":"Amniocentesis = prenatal test sampling amniotic fluid to detect chromosomal disorders.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Morula is:","o":["16-cell solid embryo","Fertilized egg","8-cell stage","Blastocyst"],"a":0,"e":"Morula = solid ball of ~16 cells from cleavage. Before: 2, 4, 8-cell stages.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Colostrum contains:","o":["No nutrients","Rich in IgA antibodies + proteins","Only lactose","Only water"],"a":1,"e":"Colostrum (first milk) rich in IgA antibodies + proteins — provides passive immunity.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Identical twins from:","o":["Two eggs + two sperms","One egg + two sperms","One fertilized egg that splits","Two eggs + one sperm"],"a":2,"e":"Monozygotic (identical) twins = one zygote splits. Dizygotic = two separate eggs.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Normal sperm count:","o":["<10 million/mL","≥15-20 million/mL","100 million/mL","1 million/mL"],"a":1,"e":"Normal sperm count ≥15-20 million/mL. Below 15 = oligospermia. Zero = azoospermia.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Spermatogenesis occurs in:","o":["Epididymis","Seminiferous tubules","Vas deferens","Interstitial cells"],"a":1,"e":"Spermatogenesis in seminiferous tubules. Maturation in epididymis.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Estrogen produced by:","o":["Corpus luteum only","Ovarian follicle + corpus luteum","Uterus","Placenta only"],"a":1,"e":"Estrogen mainly from ovarian follicle (granulosa cells) + corpus luteum + placenta.","ch":"Reproduction","tag":"Must Do"},
        {"q":"Mendel's law of segregation:","o":["Genes on chromosomes","Two alleles separate during gamete formation","Genes are independent","Dominant masks recessive"],"a":1,"e":"Law of Segregation: two alleles of gene separate during gamete formation.","ch":"Genetics","tag":"Must Do"},
        {"q":"Monohybrid cross F2 ratio:","o":["1:2:1","3:1","9:3:3:1","1:1"],"a":1,"e":"Monohybrid F2 phenotypic ratio = 3:1. Genotypic = 1:2:1.","ch":"Genetics","tag":"Must Do"},
        {"q":"Dihybrid cross F2 ratio:","o":["3:1","1:2:1","9:3:3:1","15:1"],"a":2,"e":"Dihybrid F2 phenotypic ratio = 9:3:3:1 (independent assortment).","ch":"Genetics","tag":"Must Do"},
