        {"q":"Dimensional formula of pressure:","o":["[MLT⁻²]","[ML⁻¹T⁻²]","[ML²T⁻²]","[LT⁻¹]"],"a":1,"e":"Pressure = Force/Area = N/m² → [MLT⁻²]/[L²] = [ML⁻¹T⁻²].","ch":"Units & Dimensions","tag":"Must Do"},
        {"q":"SI unit of electric current:","o":["Volt","Ohm","Ampere","Coulomb"],"a":2,"e":"Ampere (A) is the SI base unit of electric current.","ch":"Units & Dimensions","tag":"Must Do"},
        {"q":"One light year is unit of:","o":["Time","Speed","Distance","Mass"],"a":2,"e":"Light year = distance light travels in one year ≈ 9.46 × 10¹⁵ m. Unit of distance.","ch":"Units & Dimensions","tag":"Must Do"},
        {"q":"Parsec is unit of:","o":["Time","Astronomical distance","Speed","Mass"],"a":1,"e":"Parsec ≈ 3.086 × 10¹⁶ m ≈ 3.26 light years. Unit of astronomical distance.","ch":"Units & Dimensions","tag":"Should Do"},
        {"q":"Dimensional formula of momentum:","o":["[MLT⁻²]","[MLT⁻¹]","[ML²T⁻²]","[MLT]"],"a":1,"e":"Momentum = mass × velocity = kg × m/s → [MLT⁻¹].","ch":"Units & Dimensions","tag":"Must Do"},
        {"q":"Which physical quantity has same dimensions as work?","o":["Force","Torque","Power","Pressure"],"a":1,"e":"Torque = r × F = N·m = [ML²T⁻²]. Same dimensional formula as work/energy.","ch":"Units & Dimensions","tag":"Must Do"},
        {"q":"Dimensional formula of gravitational constant G:","o":["[M⁻¹L³T⁻²]","[MLT⁻²]","[ML²T⁻²]","[M⁻¹LT⁻²]"],"a":0,"e":"From F = Gm₁m₂/r² → G = Fr²/m₁m₂ → [MLT⁻²][L²]/[M²] = [M⁻¹L³T⁻²].","ch":"Units & Dimensions","tag":"Should Do"},
        {"q":"Equations of motion are valid for:","o":["Variable acceleration","Uniform acceleration only","Any motion","Circular motion"],"a":1,"e":"v=u+at, s=ut+½at², v²=u²+2as are valid only for uniform (constant) acceleration.","ch":"Motion","tag":"Must Do"},
        {"q":"A body starts from rest. Using v²=u²+2as with u=0, v=10m/s, a=2m/s². Distance s=?","o":["25 m","50 m","100 m","10 m"],"a":0,"e":"v²=u²+2as → 100=0+2×2×s → s=100/4=25m.","ch":"Motion","tag":"Must Do"},
        {"q":"Acceleration due to gravity g =","o":["9.8 cm/s²","9.8 m/s²","8.9 m/s²","10 m/s²"],"a":1,"e":"Standard g = 9.8 m/s² ≈ 10 m/s² (for approximation). Acts downward on all objects.","ch":"Motion","tag":"Must Do"},
        {"q":"A ball is thrown upward with v=20m/s. Maximum height (g=10)?","o":["10 m","20 m","40 m","80 m"],"a":1,"e":"At max height v=0. v²=u²-2gh → 0=400-20h → h=20m.","ch":"Motion","tag":"Must Do"},
        {"q":"Time for ball thrown up with u=20m/s to return to ground (g=10)?","o":["2 s","4 s","6 s","8 s"],"a":1,"e":"Total time = 2u/g = 2×20/10 = 4s. (Time up = time down).","ch":"Motion","tag":"Must Do"},
        {"q":"Velocity-time graph slope gives:","o":["Displacement","Velocity","Acceleration","Distance"],"a":2,"e":"Slope of v-t graph = Δv/Δt = acceleration. Area under v-t graph = displacement.","ch":"Motion","tag":"Must Do"},
        {"q":"Area under velocity-time graph gives:","o":["Acceleration","Speed","Displacement","Force"],"a":2,"e":"Area under v-t graph = displacement. Area under a-t graph = change in velocity.","ch":"Motion","tag":"Must Do"},
        {"q":"A car accelerates from 0 to 20 m/s in 5s. Acceleration is:","o":["4 m/s²","5 m/s²","10 m/s²","100 m/s²"],"a":0,"e":"a = (v-u)/t = (20-0)/5 = 4 m/s².","ch":"Motion","tag":"Must Do"},
        {"q":"For a freely falling body (u=0), distance fallen in t seconds:","o":["gt","gt²","½gt²","2gt"],"a":2,"e":"s = ut + ½at² = 0 + ½gt² = ½gt² (u=0 for free fall from rest).","ch":"Motion","tag":"Must Do"},
        {"q":"Relative velocity of two bodies moving in same direction at v₁ and v₂:","o":["v₁+v₂","v₁-v₂","v₁×v₂","v₁/v₂"],"a":1,"e":"Relative velocity (same direction) = v₁ - v₂. Opposite direction = v₁ + v₂.","ch":"Motion","tag":"Must Do"},
        {"q":"Projectile has maximum range when projected at angle:","o":["30°","45°","60°","90°"],"a":1,"e":"Maximum range R = u²sin2θ/g → maximum when sin2θ=1 → 2θ=90° → θ=45°.","ch":"Motion","tag":"Must Do"},
        {"q":"In uniform circular motion, acceleration is directed:","o":["Tangentially","Radially outward","Radially inward (centripetal)","Zero"],"a":2,"e":"Centripetal acceleration = v²/r directed toward center (radially inward).","ch":"Motion","tag":"Must Do"},
        {"q":"Range of projectile R = u²sin2θ/g. At θ=30°, sin60°=0.866, u=20m/s, g=10:","o":["34.6 m","17.3 m","40 m","20 m"],"a":0,"e":"R = 20²×0.866/10 = 400×0.866/10 = 34.64 m ≈ 34.6m.","ch":"Motion","tag":"Should Do"},
        {"q":"A body moving in circle of radius r with speed v. Centripetal force =","o":["mv/r","mv²/r","mvr","mv²r"],"a":1,"e":"Centripetal force = mv²/r = mω²r. Directed toward center.","ch":"Motion","tag":"Must Do"},
        {"q":"At highest point of projectile, vertical velocity is:","o":["Maximum","u (initial)","Zero","g"],"a":2,"e":"At maximum height, vertical component of velocity = 0. Horizontal = ucosθ (unchanged).","ch":"Motion","tag":"Must Do"},
        {"q":"Newton's first law is also called:","o":["Law of acceleration","Law of inertia","Law of action-reaction","Law of gravitation"],"a":1,"e":"Newton's 1st law = Law of Inertia. Body stays at rest or uniform motion unless external force acts.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Newton's second law: F =","o":["mv","ma","m/a","mv²"],"a":1,"e":"F = ma. Force = mass × acceleration. Unit = Newton (N).","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Newton's third law states:","o":["F=ma","Every action has equal and opposite reaction","Body continues at rest","F=mv"],"a":1,"e":"Newton's 3rd law: For every action there is equal and opposite reaction. Action-reaction pairs.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"A 5kg mass accelerates at 3m/s². Net force =","o":["1.67 N","15 N","8 N","0.6 N"],"a":1,"e":"F = ma = 5 × 3 = 15 N.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Impulse = ","o":["Force × time","Force × distance","Mass × velocity","Force/time"],"a":0,"e":"Impulse = F×t = change in momentum (Δp). Unit = N·s = kg·m/s.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Law of conservation of momentum: In absence of external force, total momentum is:","o":["Zero","Increasing","Constant","Decreasing"],"a":2,"e":"Conservation of momentum: Σp = constant when no external force acts.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"A 60kg man stands in elevator accelerating up at 2m/s². Apparent weight (g=10)?","o":["600 N","720 N","480 N","600 N"],"a":1,"e":"N = m(g+a) = 60(10+2) = 60×12 = 720 N. Apparent weight increases when accelerating up.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Friction depends on:","o":["Speed","Contact area","Normal force and nature of surfaces (μ)","Mass only"],"a":2,"e":"Friction f = μN. Depends on normal force N and coefficient of friction μ. Not on area or speed.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Static friction is always _____ kinetic friction:","o":["Less than","Greater than or equal to","Equal to","Half of"],"a":1,"e":"Static friction (max) ≥ kinetic friction. It's easier to keep sliding than to start sliding.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Rocket propulsion works on:","o":["Newton's 1st law","Newton's 2nd law","Newton's 3rd law","Bernoulli's principle"],"a":2,"e":"Rocket: gases expelled backward (action) → rocket moves forward (reaction). Newton's 3rd law.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"A gun recoils when fired — this is due to:","o":["Newton's 1st law","Newton's 2nd law","Conservation of momentum","Friction"],"a":2,"e":"Gun-bullet system: initial momentum=0. After firing: bullet forward, gun backward. Momentum conserved.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Which has more inertia — 10kg stone or 1kg ball?","o":["Ball","Stone (more mass = more inertia)","Same","Depends on speed"],"a":1,"e":"Inertia ∝ mass. 10kg stone has 10× more inertia than 1kg ball.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"A 10kg block on surface, μ=0.4, g=10. Friction force =","o":["4 N","40 N","400 N","0.4 N"],"a":1,"e":"f = μN = μmg = 0.4 × 10 × 10 = 40 N.","ch":"Laws of Motion","tag":"Must Do"},
        {"q":"Work = Force × displacement × cosθ. Work done when force ⊥ displacement:","o":["Maximum","Minimum","Zero","Negative"],"a":2,"e":"W = Fscosθ. When θ=90°, cos90°=0, W=0. e.g. gravity does no work on horizontal motion.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Kinetic energy formula:","o":["mv","mv²","½mv²","2mv²"],"a":2,"e":"KE = ½mv². Depends on mass and velocity squared.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Potential energy formula (gravitational):","o":["mgh","½mgh","mg/h","m²gh"],"a":0,"e":"PE = mgh. Gravitational potential energy at height h above reference.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Power = Work/time. A motor does 1000J work in 5s. Power =","o":["5000 W","200 W","100 W","5 W"],"a":1,"e":"P = W/t = 1000/5 = 200 W.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"1 horsepower =","o":["746 W","1000 W","500 W","1500 W"],"a":0,"e":"1 HP = 746 W ≈ 0.746 kW. Used to rate engine power.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Work-energy theorem states:","o":["F=ma","Net work done = change in KE","W=Fs","P=W/t"],"a":1,"e":"Work-energy theorem: Net work = ΔKE = ½mv² - ½mu².","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"A 2kg mass moving at 4m/s. Its KE =","o":["4 J","8 J","16 J","32 J"],"a":2,"e":"KE = ½mv² = ½ × 2 × 4² = ½ × 2 × 16 = 16 J.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Conservative force is one where work done:","o":["Depends on path","Is path independent","Is always zero","Is always positive"],"a":1,"e":"Conservative force (gravity, spring) — work is path independent. Only depends on initial and final positions.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Elastic collision conserves:","o":["Momentum only","KE only","Both KE and momentum","Neither"],"a":2,"e":"Elastic collision: both KE and momentum conserved. Inelastic: only momentum conserved.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"In inelastic collision:","o":["Both KE and momentum conserved","Only momentum conserved","Only KE conserved","Neither conserved"],"a":1,"e":"Inelastic collision: momentum conserved, KE not conserved (converted to heat, sound).","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Spring potential energy = ","o":["kx","½kx","½kx²","kx²"],"a":2,"e":"Spring PE = ½kx² where k=spring constant, x=extension/compression.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"A 5kg mass falls 10m (g=10). What is KE when it reaches ground?","o":["50 J","500 J","5000 J","5 J"],"a":1,"e":"PE = mgh = 5×10×10 = 500J. All PE converts to KE. KE = 500 J.","ch":"Work Energy Power","tag":"Must Do"},
        {"q":"Newton's law of gravitation: F = ","o":["Gm₁m₂r","Gm₁m₂/r²","Gm₁m₂/r","m₁m₂/Gr²"],"a":1,"e":"F = Gm₁m₂/r². Gravitational force ∝ product of masses, inversely ∝ square of distance.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Value of G (gravitational constant):","o":["6.67×10⁻¹¹ N·m²/kg²","9.8 N/kg","6.67×10⁻⁸","6.02×10²³"],"a":0,"e":"G = 6.67×10⁻¹¹ N·m²/kg². Universal constant. Very small — gravity is the weakest force.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Escape velocity from Earth's surface:","o":["8 km/s","11.2 km/s","3 km/s","40 km/s"],"a":1,"e":"Escape velocity = √(2gR) = √(2×9.8×6.4×10⁶) ≈ 11.2 km/s.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Orbital velocity of satellite at radius r:","o":["√(GM/r)","√(2GM/r)","GM/r","√(gr)"],"a":0,"e":"Orbital velocity v₀ = √(GM/r) = √(gR²/r). For low orbit ≈ √(gR) ≈ 7.9 km/s.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Geostationary satellite time period:","o":["12 hours","24 hours (stays over same spot)","6 hours","48 hours"],"a":1,"e":"Geostationary satellite: T=24h, altitude ~36000 km, equatorial orbit. Appears stationary.","ch":"Gravitation","tag":"Must Do"},
        {"q":"At what height does g become g/4 (R=radius of Earth)?","o":["R","2R","R/2","4R"],"a":0,"e":"g' = g(R/(R+h))². For g'=g/4: R/(R+h)=½ → h=R.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Kepler's third law: T² ∝","o":["r","r²","r³","1/r"],"a":2,"e":"Kepler's 3rd law: T² ∝ r³ (T=orbital period, r=orbital radius). Also called harmonic law.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Weight of body at center of Earth:","o":["Maximum","Same as surface","Zero","Double"],"a":2,"e":"At center of Earth, g=0 (mass distributed equally all around). Weight = mg = 0.","ch":"Gravitation","tag":"Must Do"},
        {"q":"Gravitational potential energy is:","o":["Always positive","Always negative","Zero","Depends on height"],"a":1,"e":"Gravitational PE = -GMm/r. Negative because work must be done against gravity to separate masses.","ch":"Gravitation","tag":"Should Do"},
        {"q":"Kepler's first law states orbit of planet is:","o":["Circle","Ellipse with sun at one focus","Parabola","Hyperbola"],"a":1,"e":"Kepler's 1st law: Planets orbit Sun in ellipses with Sun at one focus.","ch":"Gravitation","tag":"Must Do"},
        {"q":"First law of thermodynamics:","o":["Energy cannot be created or destroyed","Heat flows from hot to cold","Entropy of universe increases","Absolute zero cannot be reached"],"a":0,"e":"First law = conservation of energy. ΔU = Q - W. Energy can be converted, not created or destroyed.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Second law of thermodynamics (Clausius statement):","o":["Energy conserved","Heat flows spontaneously from hot to cold body","Entropy constant","Absolute zero unreachable"],"a":1,"e":"Second law (Clausius): Heat flows spontaneously from hot to cold body, never reverse on its own.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Zeroth law of thermodynamics defines:","o":["Energy","Entropy","Temperature (thermal equilibrium)","Pressure"],"a":2,"e":"Zeroth law: If A in equilibrium with C, and B in equilibrium with C, then A in equilibrium with B. Defines temperature.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"In isothermal process, _____ remains constant:","o":["Pressure","Volume","Temperature","Entropy"],"a":2,"e":"Isothermal (iso=same, thermal=heat) = constant temperature. For ideal gas: PV = constant.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"In adiabatic process, _____ remains constant:","o":["Temperature","Pressure","Heat (Q=0, no heat exchange)","Entropy"],"a":2,"e":"Adiabatic = no heat exchange (Q=0). ΔU = -W. e.g. quick compression of gas.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"In isobaric process, _____ remains constant:","o":["Temperature","Pressure","Volume","Heat"],"a":1,"e":"Isobaric (iso=same, baric=pressure) = constant pressure. e.g. boiling at atmospheric pressure.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Efficiency of Carnot engine:","o":["T₁/T₂","1-T₂/T₁","T₂/T₁","1-T₁/T₂"],"a":1,"e":"Carnot efficiency η = 1 - T₂/T₁ (T₂=cold, T₁=hot in Kelvin). Maximum possible efficiency.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Specific heat of water is:","o":["1 cal/g°C (4.18 J/g°C)","2 cal/g°C","0.5 cal/g°C","4 cal/g°C"],"a":0,"e":"Specific heat of water = 1 cal/g°C = 4.18 J/g°C. Highest of common substances.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Heat transfer by radiation does NOT require:","o":["Temperature difference","Medium (can travel through vacuum)","Energy","Wavelength"],"a":1,"e":"Radiation can travel through vacuum (e.g. sun's heat reaches Earth). No medium needed.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Newton's law of cooling states rate of cooling ∝:","o":["Temperature of body","Square of temperature","Difference from surrounding temperature","Cube of temperature"],"a":2,"e":"Newton's law: dT/dt ∝ (T - T₀). Rate of cooling proportional to temperature excess over surroundings.","ch":"Thermodynamics","tag":"Should Do"},
        {"q":"Stefan's law: Power emitted ∝","o":["T","T²","T³","T⁴"],"a":3,"e":"Stefan's law: P = σAT⁴. Power radiated ∝ fourth power of absolute temperature.","ch":"Thermodynamics","tag":"Should Do"},
        {"q":"Triple point of water is:","o":["0°C, 1 atm","273.16 K, 611.2 Pa","100°C","0 K"],"a":1,"e":"Triple point of water = 273.16 K (0.01°C) at 611.2 Pa. All three phases coexist.","ch":"Thermodynamics","tag":"Should Do"},
        {"q":"Coulomb's law: F = ","o":["kq₁q₂r","kq₁q₂/r","kq₁q₂/r²","kq₁q₂r²"],"a":2,"e":"Coulomb's law: F = kq₁q₂/r² = q₁q₂/4πε₀r². k = 9×10⁹ N·m²/C².","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Electric field E at distance r from charge Q:","o":["kQ/r","kQ/r²","kQr","kQ²/r²"],"a":1,"e":"E = kQ/r² = F/q₀. Direction: away from +ve charge, toward -ve charge.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Electric potential V at distance r from charge Q:","o":["kQ/r","kQ/r²","kQr","kQ²/r"],"a":0,"e":"V = kQ/r. Potential is scalar. Work done = qV. V due to +ve charge is positive.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Electric flux through closed surface = charge enclosed / ε₀. This is:","o":["Coulomb's law","Gauss's law","Ampere's law","Faraday's law"],"a":1,"e":"Gauss's law: φ = Q_enc/ε₀. Total electric flux through closed surface = charge enclosed / permittivity.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Capacitance of parallel plate capacitor C = ","o":["ε₀A/d","ε₀d/A","ε₀A×d","A/ε₀d"],"a":0,"e":"C = ε₀A/d (or Kε₀A/d with dielectric). Increases with area A, decreases with separation d.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Energy stored in capacitor:","o":["CV","½CV²","C²V","CV²"],"a":1,"e":"Energy stored U = ½CV² = Q²/2C = QV/2.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"When capacitors connected in series, equivalent capacitance:","o":["Increases","Decreases","Stays same","Doubles"],"a":1,"e":"In series: 1/C = 1/C₁ + 1/C₂ + ... Equivalent C is smaller than smallest capacitor.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"When capacitors connected in parallel:","o":["C decreases","C = C₁ + C₂ + ...","C = C₁C₂/(C₁+C₂)","C = C₁/C₂"],"a":1,"e":"In parallel: C = C₁ + C₂ + ... Equivalent C is sum of all. Voltage same across all.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Value of ε₀ (permittivity of free space):","o":["8.85×10⁻¹² C²/N·m²","9×10⁹ N·m²/C²","6.67×10⁻¹¹","1.6×10⁻¹⁹ C"],"a":0,"e":"ε₀ = 8.85×10⁻¹² C²/N·m² (F/m). k = 1/4πε₀ = 9×10⁹ N·m²/C².","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Electric field inside a conductor is:","o":["Maximum","Minimum","Zero","Equal to surface field"],"a":2,"e":"Electric field inside conductor is zero. Free charges redistribute to cancel internal field.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Dielectric constant K is always:","o":["Less than 1","Greater than or equal to 1","Negative","Zero"],"a":1,"e":"Dielectric constant K ≥ 1. K=1 for vacuum. K=80 for water. Increases capacitance by factor K.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Charge on electron =","o":["1.6×10⁻¹⁹ C","9.1×10⁻³¹ C","1.6×10⁻¹⁸ C","6.02×10²³ C"],"a":0,"e":"Charge of electron = -1.6×10⁻¹⁹ C. Mass of electron = 9.1×10⁻³¹ kg.","ch":"Electrostatics","tag":"Must Do"},
        {"q":"Ohm's law: V = ","o":["IR","I/R","R/I","I²R"],"a":0,"e":"Ohm's law: V = IR. Current I = V/R. Resistance R = V/I.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Resistors in series: equivalent resistance:","o":["R = R₁R₂/(R₁+R₂)","R = R₁+R₂+R₃","R = 1/R₁+1/R₂","Same as smallest"],"a":1,"e":"Series: R = R₁+R₂+R₃. Same current through all, voltage divides.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Resistors in parallel: equivalent resistance formula:","o":["R = R₁+R₂","1/R = 1/R₁+1/R₂","R = R₁R₂","R = R₁/R₂"],"a":1,"e":"Parallel: 1/R = 1/R₁+1/R₂+... For two: R = R₁R₂/(R₁+R₂). Smaller than smallest.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Electric power P = ","o":["V/I","VI = I²R = V²/R","IR","V²R"],"a":1,"e":"P = VI = I²R = V²/R. Unit = Watt. Energy = P×t.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Resistivity (ρ) of material: R = ","o":["ρL/A","ρA/L","ρ/LA","LA/ρ"],"a":0,"e":"R = ρL/A. ρ depends on material. R ∝ length L, inversely ∝ cross-section area A.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Kirchhoff's current law (KCL) states:","o":["Sum of voltages = 0","Sum of currents at junction = 0","V = IR","P = VI"],"a":1,"e":"KCL: ΣI = 0 at junction. Currents entering = currents leaving. Based on charge conservation.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Kirchhoff's voltage law (KVL) states:","o":["ΣI = 0","ΣV = 0 around closed loop","R = V/I","P = I²R"],"a":1,"e":"KVL: Sum of voltages around any closed loop = 0. Based on energy conservation.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Wheatstone bridge is balanced when:","o":["P/Q = R/S","P+Q = R+S","P×Q = R×S","P-Q = R-S"],"a":0,"e":"Balanced Wheatstone bridge: P/Q = R/S. No current through galvanometer. Used to find unknown resistance.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"A 100W bulb and 60W bulb connected in series. Which is brighter?","o":["100W","60W","Both same","Neither"],"a":1,"e":"In series, same current flows. P=I²R. Higher resistance dissipates more power. 60W bulb has higher resistance (V²/P).","ch":"Current Electricity","tag":"Must Do"},
        {"q":"EMF of cell vs terminal voltage:","o":["EMF = terminal voltage always","Terminal voltage = EMF - Ir (during current flow)","Terminal voltage > EMF","EMF = 0 when current flows"],"a":1,"e":"V_terminal = EMF - Ir. During discharge: terminal V < EMF due to internal resistance r.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Superconductivity occurs at:","o":["Very high temperature","Room temperature","Very low temperature (near 0 K)","High pressure"],"a":2,"e":"Superconductors have zero resistance below critical temperature (near absolute zero).","ch":"Current Electricity","tag":"Should Do"},
        {"q":"If R₁ and R₂ in parallel give R_eq, then:","o":["R_eq > max(R₁,R₂)","R_eq < min(R₁,R₂)","R_eq = R₁+R₂","R_eq = R₁×R₂"],"a":1,"e":"Parallel resistance is always less than the smallest individual resistance.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"A 60W bulb runs at 220V. Current = ","o":["0.27 A","3.67 A","13200 A","0.03 A"],"a":0,"e":"I = P/V = 60/220 = 0.273 A.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Unit of resistivity:","o":["Ohm","Ohm·meter","Ohm/meter","Meter/Ohm"],"a":1,"e":"Resistivity ρ unit = Ω·m. From R = ρL/A → ρ = RA/L = Ω·m²/m = Ω·m.","ch":"Current Electricity","tag":"Must Do"},
        {"q":"Magnetic force on moving charge: F = ","o":["qvB","qvBsinθ","qvBcosθ","qvB²"],"a":1,"e":"F = qvBsinθ. Maximum when v⊥B (θ=90°). Zero when v parallel to B (θ=0°).","ch":"Magnetism","tag":"Must Do"},
        {"q":"Force on current-carrying conductor in magnetic field:","o":["F = qvB","F = BIL sinθ","F = BIL cosθ","F = IL/B"],"a":1,"e":"F = BILsinθ. Maximum when current ⊥ B. Used in electric motors.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Biot-Savart law gives magnetic field due to:","o":["Moving charge","Current element","Magnet","Capacitor"],"a":1,"e":"Biot-Savart law: dB = μ₀Idl sinθ/4πr². Gives B due to small current element.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Ampere's law: ∮B·dl = ","o":["μ₀I_enc","μ₀I/r","B×length","μ₀I²"],"a":0,"e":"Ampere's circuital law: ∮B·dl = μ₀I_enclosed. Used to find B for symmetric current distributions.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Magnetic field at center of circular coil of radius R carrying current I:","o":["μ₀I/2R","μ₀I/4R","μ₀I/R","μ₀IR/2"],"a":0,"e":"B = μ₀I/2R. For N turns: B = μ₀NI/2R.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Moving coil galvanometer works on principle of:","o":["Heating effect","Magnetic effect of current","Electromagnetic induction","Photoelectric effect"],"a":1,"e":"Galvanometer: current-carrying coil in magnetic field experiences torque → deflection.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Diamagnetic materials are:","o":["Strongly attracted by magnets","Weakly repelled by magnets","Not affected by magnets","Permanently magnetized"],"a":1,"e":"Diamagnetic (e.g. Bi, Cu, water): weakly repelled by magnets. χ is small negative.","ch":"Magnetism","tag":"Should Do"},
        {"q":"Ferromagnetic materials (iron, nickel) have:","o":["Small negative susceptibility","Small positive susceptibility","Very large positive susceptibility","Zero susceptibility"],"a":2,"e":"Ferromagnetic: very large positive χ. Strongly attracted by magnets. Have domains.","ch":"Magnetism","tag":"Must Do"},
        {"q":"Curie point is:","o":["Temperature at which superconductivity occurs","Temperature above which ferromagnetism is lost","Melting point of magnets","Absolute zero"],"a":1,"e":"Curie temperature: above this, ferromagnetic → paramagnetic. Iron's Curie temp = 770°C.","ch":"Magnetism","tag":"Should Do"},
        {"q":"Earth's magnetic field at poles is directed:","o":["Horizontal","Vertical (downward at N pole)","At 45°","Zero"],"a":1,"e":"At magnetic poles, field is vertical. At equator, field is horizontal. Dip = 90° at poles.","ch":"Magnetism","tag":"Should Do"},
        {"q":"Faraday's law of EMI states induced EMF =","o":["BIL","−dΦ/dt (rate of change of flux)","qvB","V = IR"],"a":1,"e":"Faraday's law: ε = -dΦ/dt = -N×dΦ/dt for N turns. Magnitude = rate of flux change.","ch":"EMI","tag":"Must Do"},
        {"q":"Lenz's law states induced current opposes:","o":["Applied voltage","The change causing it (conservation of energy)","Ohm's law","Faraday's law"],"a":1,"e":"Lenz's law: Induced current direction opposes the change in flux causing it. Ensures energy conservation.","ch":"EMI","tag":"Must Do"},
        {"q":"Self-inductance of coil is defined by:","o":["V = LdI/dt","V = IR","V = Q/C","V = BIL"],"a":0,"e":"Self-inductance L: V = -L(dI/dt). Unit = Henry (H). Opposes change in current.","ch":"EMI","tag":"Must Do"},
        {"q":"Mutual inductance M: EMF in secondary = ","o":["MdI₁/dt","MI₁","M/I₁","I₁/M"],"a":0,"e":"Mutual inductance: ε₂ = -M(dI₁/dt). M depends on geometry and number of turns.","ch":"EMI","tag":"Must Do"},
        {"q":"Energy stored in inductor:","o":["LI","½LI²","LI²","½LI"],"a":1,"e":"Energy stored in inductor U = ½LI². Analogous to ½mv² for kinetic energy.","ch":"EMI","tag":"Must Do"},
        {"q":"A straight conductor moves with velocity v in B field (v⊥B, L=length). Motional EMF =","o":["BLv","BL/v","BL²v","B/Lv"],"a":0,"e":"Motional EMF = BLv (when v, L, B all mutually perpendicular).","ch":"EMI","tag":"Must Do"},
        {"q":"Transformer works on principle of:","o":["Self-induction","Mutual induction","Electrostatics","Magnetism only"],"a":1,"e":"Transformer: uses mutual induction. Primary coil EMF induces EMF in secondary.","ch":"EMI","tag":"Must Do"},
        {"q":"Step-up transformer: Ns/Np > 1, then Vs/Vp:","o":["Less than 1","Greater than 1","Equal to 1","Depends on current"],"a":1,"e":"Step-up: Vs/Vp = Ns/Np > 1. Voltage increases. Current decreases. Power same (ideally).","ch":"EMI","tag":"Must Do"},
        {"q":"Eddy currents are used in:","o":["Transformers","Induction furnace / electromagnetic braking","Galvanometers","Capacitors"],"a":1,"e":"Eddy currents used in: induction furnace (heating), electromagnetic braking, speedometers.","ch":"EMI","tag":"Should Do"},
        {"q":"RMS value of AC voltage = V₀/√2. For V₀=220√2 V, Vrms =","o":["220 V","311 V","440 V","155 V"],"a":0,"e":"Vrms = V₀/√2 = 220√2/√2 = 220 V. That's why household supply is '220V AC'.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"In pure inductor circuit, current lags voltage by:","o":["90°","45°","180°","0°"],"a":0,"e":"Pure inductor: current lags voltage by 90° (π/2). Inductive reactance XL = ωL.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"In pure capacitor circuit, current leads voltage by:","o":["90°","45°","180°","0°"],"a":0,"e":"Pure capacitor: current leads voltage by 90°. Capacitive reactance XC = 1/ωC.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Inductive reactance XL = ","o":["ωL","1/ωL","ωC","1/ωC"],"a":0,"e":"XL = ωL = 2πfL. Increases with frequency. Inductor blocks high frequency AC.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Capacitive reactance XC = ","o":["ωC","ωL","1/ωC","1/ωL"],"a":2,"e":"XC = 1/ωC = 1/2πfC. Decreases with frequency. Capacitor blocks DC (f=0).","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Resonance in LCR circuit occurs when:","o":["XL = XC (ω = 1/√LC)","XL > XC","R = XL","XC = R"],"a":0,"e":"Resonance: XL = XC → ω₀ = 1/√LC. Impedance Z = R (minimum). Current maximum.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Power factor in AC circuit = ","o":["Z/R","R/Z (cosφ)","XL/Z","XC/Z"],"a":1,"e":"Power factor = cosφ = R/Z. Max power when cosφ=1 (pure resistor). Zero in pure L or C.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Impedance Z of LCR circuit = ","o":["R+XL+XC","√(R²+(XL-XC)²)","XL-XC","R+XL-XC"],"a":1,"e":"Impedance Z = √(R²+(XL-XC)²). Phase angle φ = tan⁻¹((XL-XC)/R).","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Average power in AC circuit P = ","o":["VrmsIrms","VrmsIrmscosφ","V₀I₀","V₀I₀cosφ"],"a":1,"e":"P_avg = VrmsIrmscosφ = I²rms×R. Power factor cosφ determines actual power.","ch":"AC Circuits","tag":"Must Do"},
        {"q":"Speed of light in vacuum:","o":["3×10⁸ m/s","3×10⁶ m/s","3×10¹⁰ m/s","3×10⁵ km/s"],"a":0,"e":"c = 3×10⁸ m/s = 3×10⁵ km/s. Same in all reference frames (Einstein).","ch":"Optics","tag":"Must Do"},
        {"q":"Refractive index n = c/v. For glass n=1.5, speed of light in glass =","o":["4.5×10⁸","2×10⁸","1.5×10⁸","3×10⁸"],"a":1,"e":"v = c/n = 3×10⁸/1.5 = 2×10⁸ m/s.","ch":"Optics","tag":"Must Do"},
        {"q":"Snell's law of refraction:","o":["n₁sinθ₁ = n₂sinθ₂","n₁cosθ₁ = n₂cosθ₂","n₁θ₁ = n₂θ₂","sinθ₁/sinθ₂ = n₂-n₁"],"a":0,"e":"Snell's law: n₁sinθ₁ = n₂sinθ₂. When going denser medium, ray bends toward normal.","ch":"Optics","tag":"Must Do"},
        {"q":"Lens formula: 1/f = ","o":["1/v - 1/u","1/v + 1/u","1/u - 1/v","v - u"],"a":0,"e":"Lens formula: 1/f = 1/v - 1/u. Mirror formula: 1/f = 1/v + 1/u.","ch":"Optics","tag":"Must Do"},
        {"q":"Power of lens P = ","o":["f","1/f (in meters)","f²","1/f²"],"a":1,"e":"P = 1/f (in meters). Unit = Dioptre (D). Convex lens: +ve P. Concave: -ve P.","ch":"Optics","tag":"Must Do"},
        {"q":"A convex lens of focal length 20cm. Power =","o":["0.2 D","5 D","20 D","0.05 D"],"a":1,"e":"P = 1/f = 1/0.2m = 5 Dioptre.","ch":"Optics","tag":"Must Do"},
        {"q":"Total internal reflection (TIR) occurs when:","o":["Light goes from rare to dense medium","Light goes from dense to rare and angle > critical angle","Angle of incidence = 0","Refractive index = 1"],"a":1,"e":"TIR: light in denser medium hits interface at angle > critical angle → no refraction, full reflection.","ch":"Optics","tag":"Must Do"},
        {"q":"Critical angle C is related to refractive index n by:","o":["sinC = n","sinC = 1/n","sinC = n²","cosC = 1/n"],"a":1,"e":"sinC = 1/n (for medium with respect to air). C = sin⁻¹(1/n).","ch":"Optics","tag":"Must Do"},
        {"q":"Optical fibre works on principle of:","o":["Reflection","Refraction","Total internal reflection","Diffraction"],"a":2,"e":"Optical fibres use TIR to transmit light with minimal loss over long distances.","ch":"Optics","tag":"Must Do"},
        {"q":"Mirror formula: 1/f = 1/v + 1/u. For concave mirror f =","o":["Positive","Negative (convention)","Zero","Infinity"],"a":1,"e":"Concave mirror: f is negative (using sign convention where distances measured from pole).","ch":"Optics","tag":"Must Do"},
        {"q":"Magnification m = v/u. For real, inverted image, m is:","o":["Positive","Negative","Zero","Infinity"],"a":1,"e":"m = -v/u. Negative m → real and inverted image. Positive m → virtual and erect.","ch":"Optics","tag":"Must Do"},
        {"q":"Rainbow is formed by:","o":["Reflection","Refraction only","Dispersion + TIR + refraction in water droplets","Diffraction"],"a":2,"e":"Rainbow: sunlight enters water droplets, disperses (different wavelengths refract differently), TIR inside, exits.","ch":"Optics","tag":"Must Do"},
        {"q":"Blue light scatters more than red light because scattering ∝","o":["λ","λ²","1/λ⁴ (Rayleigh)","λ⁴"],"a":2,"e":"Rayleigh scattering ∝ 1/λ⁴. Short wavelength (blue) scatters much more → sky appears blue.","ch":"Optics","tag":"Must Do"},
        {"q":"Huygen's principle states each point on wavefront is:","o":["A source of light","A new secondary source of wavelets","A receiver","A mirror"],"a":1,"e":"Huygen's principle: every point on wavefront acts as new secondary source emitting spherical wavelets.","ch":"Optics","tag":"Must Do"},
        {"q":"Young's double slit experiment fringe width β = ","o":["λd/D","λD/d","dD/λ","λ/dD"],"a":1,"e":"Fringe width β = λD/d (D=screen distance, d=slit separation, λ=wavelength).","ch":"Optics","tag":"Must Do"},
        {"q":"In YDSE, fringe width increases if:","o":["λ decreases","D decreases","d decreases","All decrease"],"a":2,"e":"β = λD/d. Fringe width increases when slit separation d decreases.","ch":"Optics","tag":"Must Do"},
        {"q":"Condition for constructive interference (bright fringes):","o":["Path difference = (2n+1)λ/2","Path difference = nλ","Path difference = λ/4","Path difference = λ/2"],"a":1,"e":"Constructive: path diff = nλ (n=0,±1,±2...). Destructive: path diff = (2n+1)λ/2.","ch":"Optics","tag":"Must Do"},
        {"q":"Diffraction is bending of light around:","o":["Mirrors","Edges of obstacles","Lenses","Flat surfaces"],"a":1,"e":"Diffraction = bending of waves around edges/corners of obstacles. Occurs with all waves.","ch":"Optics","tag":"Must Do"},
        {"q":"Photoelectric effect is explained by:","o":["Wave theory of light","Quantum (photon) theory by Einstein","Classical mechanics","Maxwell's equations"],"a":1,"e":"Einstein (1905, Nobel 1921) explained photoelectric effect using photons. KE_max = hf - φ.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Energy of photon E = ","o":["hf","hf²","h/f","f/h"],"a":0,"e":"E = hf = hc/λ. h = Planck's constant = 6.63×10⁻³⁴ J·s.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"de Broglie wavelength λ = ","o":["h/p","hp","h/mv","h×mv"],"a":0,"e":"de Broglie: λ = h/p = h/mv. All matter has wave character. Larger mass → smaller wavelength.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Photoelectric threshold frequency condition:","o":["hf > φ (work function)","hf < φ","hf = 0","No condition"],"a":0,"e":"For emission: hf ≥ φ (work function). KE_max = hf - φ. Threshold: hf₀ = φ.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Bohr's model: angular momentum of electron = ","o":["nh/2π","nh","n²h","h/n"],"a":0,"e":"Bohr's quantization: L = nh/2π = nℏ (n = principal quantum number = 1,2,3...).","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Energy of electron in nth Bohr orbit of hydrogen:","o":["En = 13.6/n eV","En = -13.6/n² eV","En = 13.6n eV","En = -13.6n² eV"],"a":1,"e":"En = -13.6/n² eV. Ground state (n=1): -13.6 eV. Negative = bound state.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Half-life of radioactive substance: after 2 half-lives, fraction remaining =","o":["1/2","1/4","1/8","1/3"],"a":1,"e":"After each half-life, half remains. After 2: (1/2)² = 1/4 remains.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Alpha particle is:","o":["Electron","Helium nucleus (2p+2n)","Photon","Neutron"],"a":1,"e":"Alpha (α) particle = helium-4 nucleus (2 protons + 2 neutrons). Charge = +2e.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Beta particle is:","o":["Helium nucleus","Fast electron from nucleus","Photon","Proton"],"a":1,"e":"Beta (β) particle = electron (β⁻) or positron (β⁺) emitted from nucleus.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Gamma rays are:","o":["Alpha particles","Beta particles","High-energy electromagnetic radiation","Neutrons"],"a":2,"e":"Gamma (γ) rays = high-energy electromagnetic radiation (photons). No mass, no charge.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Mass defect and nuclear binding energy are related by:","o":["E = mc²","E = mc","E = m/c²","E = mc³"],"a":0,"e":"E = mc² (Einstein's mass-energy equivalence). Binding energy = mass defect × c².","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Nuclear fission involves:","o":["Combining small nuclei","Splitting heavy nucleus into smaller fragments + energy","Beta decay","Gamma emission"],"a":1,"e":"Fission = heavy nucleus (U-235) splits into smaller nuclei + neutrons + huge energy. Basis of nuclear reactor.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Nuclear fusion involves:","o":["Splitting heavy nucleus","Combining light nuclei (H→He) + huge energy","Alpha decay","Beta decay"],"a":1,"e":"Fusion = combining light nuclei (H + H → He). Powers the Sun. Requires very high temperature.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Activity of radioactive sample A = λN. Unit of activity:","o":["Hertz","Becquerel (Bq) or Curie (Ci)","Joule","Second"],"a":1,"e":"Activity = number of decays per second. Unit = Becquerel (1 Bq = 1 decay/s). 1 Curie = 3.7×10¹⁰ Bq.","ch":"Modern Physics","tag":"Must Do"},
        {"q":"Intrinsic semiconductor at 0K behaves like:","o":["Conductor","Insulator","Semiconductor","Superconductor"],"a":1,"e":"At 0K, all electrons in valence band, no free electrons → behaves like insulator.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"n-type semiconductor is formed by doping with:","o":["Trivalent impurity","Pentavalent impurity (P, As, Sb)","Bivalent","No doping"],"a":1,"e":"n-type: pentavalent dopant (5 valence electrons, one extra) → extra electrons as charge carriers.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"p-type semiconductor is formed by doping with:","o":["Pentavalent impurity","Trivalent impurity (B, Al, In)","Bivalent","Monovalent"],"a":1,"e":"p-type: trivalent dopant (3 valence electrons, one short) → holes as charge carriers.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"In p-n junction diode, forward bias means:","o":["p connected to negative","p connected to positive terminal of battery","No connection","Reverse connection"],"a":1,"e":"Forward bias: p-side to +ve, n-side to -ve of battery. Allows current (low resistance).","ch":"Semiconductors","tag":"Must Do"},
        {"q":"p-n junction in reverse bias:","o":["Allows current","Blocks current (high resistance)","Breaks down","No effect"],"a":1,"e":"Reverse bias: p to negative, n to positive. Blocks current (except tiny reverse saturation current).","ch":"Semiconductors","tag":"Must Do"},
        {"q":"Zener diode is used for:","o":["Amplification","Voltage regulation (stabilization)","Oscillation","Rectification"],"a":1,"e":"Zener diode works in reverse breakdown. Used for voltage regulation/stabilization.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"LED emits light when:","o":["Reverse biased","Forward biased","In breakdown","Unbiased"],"a":1,"e":"LED (Light Emitting Diode) emits photons when forward biased — electrons recombine with holes.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"Transistor can act as:","o":["Rectifier only","Amplifier and switch","Voltage regulator only","Oscillator only"],"a":1,"e":"Transistor: used as amplifier (small input → large output) and as switch (on/off).","ch":"Semiconductors","tag":"Must Do"},
        {"q":"Full wave rectifier output frequency for 50Hz AC input:","o":["25 Hz","50 Hz","100 Hz","200 Hz"],"a":2,"e":"Full wave rectifier: both halves of AC cycle converted. Output frequency = 2 × input = 100 Hz.","ch":"Semiconductors","tag":"Must Do"},
        {"q":"Band gap of silicon is approximately:","o":["0 eV","1.1 eV","3.5 eV","10 eV"],"a":1,"e":"Si band gap ≈ 1.1 eV. Ge ≈ 0.7 eV. Insulators have large band gap (>5 eV). Conductors have 0.","ch":"Semiconductors","tag":"Should Do"},
        {"q":"In common emitter (CE) transistor configuration, current gain β =","o":["IC/IB","IB/IC","IC/IE","IE/IC"],"a":0,"e":"Current gain β = IC/IB (common emitter). Typically β = 20-200. α = IC/IE (common base).","ch":"Semiconductors","tag":"Must Do"},
        {"q":"Time period of simple pendulum T = ","o":["2π√(l/g)","2π√(g/l)","2π√l","√(l/g)"],"a":0,"e":"T = 2π√(l/g). Depends on length l and g. Independent of mass and amplitude (small).","ch":"Waves","tag":"Must Do"},
        {"q":"Speed of sound in air at 0°C ≈","o":["100 m/s","332 m/s","1500 m/s","3×10⁸ m/s"],"a":1,"e":"Speed of sound in air ≈ 332 m/s at 0°C, 343 m/s at 20°C. Much less than light.","ch":"Waves","tag":"Must Do"},
        {"q":"Frequency = 1/T. If T = 0.02s, frequency =","o":["0.02 Hz","2 Hz","50 Hz","100 Hz"],"a":2,"e":"f = 1/T = 1/0.02 = 50 Hz. (Standard AC in India = 50 Hz).","ch":"Waves","tag":"Must Do"},
        {"q":"Wave equation: v = fλ. If f=500Hz, λ=0.68m, v=?","o":["340 m/s","500 m/s","0.68 m/s","735 m/s"],"a":0,"e":"v = fλ = 500 × 0.68 = 340 m/s. (Speed of sound in air).","ch":"Waves","tag":"Must Do"},
        {"q":"Doppler effect: when source approaches observer, frequency heard:","o":["Decreases","Increases","Stays same","Becomes zero"],"a":1,"e":"Doppler effect: source approaching → compressed waves → increased frequency (higher pitch).","ch":"Waves","tag":"Must Do"},
        {"q":"Beats frequency = ","o":["f₁+f₂","f₁-f₂ (difference)","f₁×f₂","f₁/f₂"],"a":1,"e":"Beats = periodic variation in intensity. Beat frequency = |f₁-f₂|. Used in tuning instruments.","ch":"Waves","tag":"Must Do"},
        {"q":"In resonance tube (fundamental), L = λ/4. If L=25cm, wavelength =","o":["25 cm","50 cm","100 cm","12.5 cm"],"a":2,"e":"Fundamental in closed pipe: L = λ/4 → λ = 4L = 4×25 = 100 cm.","ch":"Waves","tag":"Must Do"},
        {"q":"Stationary (standing) waves are formed by:","o":["Single progressive wave","Two identical waves traveling in opposite directions","Reflection only","Diffraction"],"a":1,"e":"Standing waves = superposition of two identical waves traveling in opposite directions.","ch":"Waves","tag":"Must Do"},
        {"q":"Nodes in standing wave are points of:","o":["Maximum vibration","Zero vibration","Half amplitude","Variable amplitude"],"a":1,"e":"Nodes = points of zero displacement. Antinodes = points of maximum amplitude.","ch":"Waves","tag":"Must Do"},
        {"q":"Longitudinal waves require:","o":["Transverse vibration","Medium with elasticity (can't travel in vacuum)","Electric field","Magnetic field"],"a":1,"e":"Longitudinal waves (sound) require material medium. Cannot travel in vacuum. Transverse waves can.","ch":"Waves","tag":"Must Do"},
        {"q":"Which of these is a transverse wave?","o":["Sound","Light","Ultrasound","All of above"],"a":1,"e":"Light is transverse wave (electric and magnetic fields oscillate perpendicular to direction of propagation).","ch":"Waves","tag":"Must Do"},
        {"q":"Ultrasound frequency is:","o":["Below 20 Hz","20-20000 Hz","Above 20000 Hz","Any frequency"],"a":2,"e":"Ultrasound > 20 kHz (above human hearing). Infrasound < 20 Hz. Audible: 20-20000 Hz.","ch":"Waves","tag":"Must Do"},

        {"q":"Average kinetic energy of gas molecule ∝","o":["P","V","T (absolute temperature)","1/T"],"a":2,"e":"KE_avg = (3/2)kT. KE directly proportional to absolute temperature T.","ch":"Kinetic Theory","tag":"Must Do"},

        {"q":"Limiting reagent is:","o":["Reagent in excess","Reagent completely consumed first (limits product)","Most expensive","Most abundant"],"a":1,"e":"Limiting reagent is completely consumed first, determines maximum product formed.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Percentage yield = ","o":["actual/theoretical × 100","theoretical/actual × 100","moles × 100","mass × 100"],"a":0,"e":"% yield = (actual yield/theoretical yield) × 100%. Rarely 100% due to side reactions.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Molar volume of ideal gas at STP:","o":["11.2 L","22.4 L","44.8 L","100 L"],"a":1,"e":"1 mole of any ideal gas at STP (0°C, 1 atm) = 22.4 L. At NTP (25°C): 24.5 L.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Number of atoms in 56 g of iron (at. mass 56):","o":["1 NA","2 NA","0.5 NA","56 NA"],"a":0,"e":"n = 56/56 = 1 mol. Number of atoms = 1 × NA = 6.02×10²³.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Equivalent weight of H₂SO₄ (molar mass 98, n-factor=2):","o":["49","98","196","32"],"a":0,"e":"Eq. wt = molar mass/n-factor = 98/2 = 49. n-factor for H₂SO₄ (diprotic acid) = 2.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Normality N = ","o":["n/V(L)","equivalents/V(L)","moles×n-factor","equivalents×V"],"a":1,"e":"Normality = number of equivalents per liter. N = Molarity × n-factor.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Mole fraction of A = ","o":["nA/(nA+nB)","nA×nB","nA-nB","nB/nA"],"a":0,"e":"Mole fraction XA = nA/(nA+nB). Sum of all mole fractions = 1. No units.","ch":"Mole Concept","tag":"Must Do"},
        {"q":"Atomic number is number of:","o":["Neutrons","Protons","Electrons + neutrons","Nucleons"],"a":1,"e":"Atomic number Z = number of protons. Defines the element. Equal to electrons in neutral atom.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Mass number A = ","o":["Protons only","Protons + Neutrons","Electrons + protons","Neutrons only"],"a":1,"e":"Mass number A = Z (protons) + N (neutrons). Represents nucleon number.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Isotopes have same:","o":["Mass number","Atomic number (same Z, different A)","Number of neutrons","None"],"a":1,"e":"Isotopes: same atomic number (same element) but different mass numbers (different neutrons).","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Heisenberg uncertainty principle states:","o":["Electrons orbit fixed paths","Position and momentum cannot both be precisely known","Energy is quantized","Light is a particle"],"a":1,"e":"Δx × Δp ≥ h/4π. Cannot simultaneously know exact position and momentum.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Bohr model failed to explain:","o":["Hydrogen spectrum","Fine structure of spectral lines and spectra of multi-electron atoms","Atomic number","Mass number"],"a":1,"e":"Bohr model only works for hydrogen-like atoms. Failed for multi-electron atoms and fine structure.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Maximum electrons in n=3 shell:","o":["8","18","32","9"],"a":1,"e":"Max electrons in nth shell = 2n². For n=3: 2×9=18. n=1:2, n=2:8, n=3:18.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Aufbau principle states electrons fill:","o":["Highest energy first","Lowest energy orbitals first","All orbitals equally","Outer shells first"],"a":1,"e":"Aufbau (build-up): electrons fill lower energy orbitals before higher energy ones.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Pauli exclusion principle: An orbital can hold maximum:","o":["1 electron","2 electrons with opposite spins","3 electrons","4 electrons"],"a":1,"e":"Pauli: no two electrons can have same set of 4 quantum numbers. Max 2 electrons per orbital (opposite spin).","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Hund's rule states electrons in same subshell:","o":["Pair before occupying empty orbitals","Occupy empty orbitals singly first (parallel spin)","Fill lowest energy orbital","Pair in any order"],"a":1,"e":"Hund's rule: electrons occupy empty orbitals singly with parallel spin before pairing.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Electronic configuration of Na (Z=11):","o":["1s²2s²2p⁶3s¹","1s²2s²2p⁵3s²","1s²2s²2p⁶3p¹","2s²2p⁶3s¹"],"a":0,"e":"Na (11): 1s²2s²2p⁶3s¹. Outer electron 3s¹ makes it monovalent. Loses 1e → Na⁺.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Shape of s orbital:","o":["Dumbbell","Spherical","Clover-leaf","Ring"],"a":1,"e":"s orbital: spherical. p orbital: dumbbell. d orbital: clover-leaf (or dumbbell with ring).","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Quantum number 'l' represents:","o":["Energy level","Angular momentum (shape of orbital)","Magnetic orientation","Spin"],"a":1,"e":"Azimuthal quantum number l: shape of orbital. l=0(s), l=1(p), l=2(d), l=3(f).","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Hydrogen spectrum series in visible range:","o":["Lyman","Balmer","Paschen","Brackett"],"a":1,"e":"Balmer series (transitions to n=2) is in visible range. Lyman (→n=1) in UV.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Wavelength of H spectrum: 1/λ = RH(1/n₁² - 1/n₂²). R is:","o":["Gas constant","Rydberg constant (1.097×10⁷ m⁻¹)","Resistance","Radius"],"a":1,"e":"Rydberg constant RH = 1.097×10⁷ m⁻¹. Used in hydrogen spectrum formula.","ch":"Atomic Structure","tag":"Must Do"},
        {"q":"Ionic bond forms by:","o":["Sharing electrons","Transfer of electrons (between metal and non-metal)","Metallic bonding","Van der Waals forces"],"a":1,"e":"Ionic bond: electron transfer from electropositive metal to electronegative non-metal. e.g. NaCl.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Covalent bond forms by:","o":["Electron transfer","Sharing of electrons","Metallic lattice","Electrostatic"],"a":1,"e":"Covalent bond: sharing electrons between atoms. e.g. H₂, Cl₂, H₂O, CH₄.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Electronegativity of fluorine is:","o":["Least","Highest of all elements (4.0 Pauling)","Medium","Same as oxygen"],"a":1,"e":"Fluorine has highest electronegativity = 4.0 (Pauling scale). F > O > N > Cl > Br.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Bond angle in water (H₂O):","o":["109.5°","120°","104.5°","180°"],"a":2,"e":"H₂O: sp³ hybridization with 2 lone pairs → bond angle compressed to 104.5°.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Hybridization of carbon in methane (CH₄):","o":["sp","sp²","sp³","sp³d"],"a":2,"e":"CH₄: sp³ hybridization. Tetrahedral geometry. Bond angle 109.5°.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"VSEPR theory predicts:","o":["Orbital shapes","Molecular geometry based on electron pair repulsion","Reaction rates","Bond energy"],"a":1,"e":"VSEPR: electron pairs repel each other → geometry minimizes repulsion → molecular shape.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Linear molecule has bond angle:","o":["90°","109.5°","120°","180°"],"a":3,"e":"Linear molecule: 180°. e.g. CO₂, BeCl₂, HCN. sp hybridization.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Hydrogen bonding is found in:","o":["HF, H₂O, NH₃ (F, O, N-H bonds)","CH₄","CCl₄","Noble gases"],"a":0,"e":"H-bonding: between H attached to electronegative atom (F, O, N) and lone pair of another such atom.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"CO₂ geometry:","o":["Bent","Linear","Trigonal planar","Tetrahedral"],"a":1,"e":"CO₂: sp hybridization, 2 double bonds, no lone pairs → linear (180°).","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Number of sigma bonds in ethylene (C₂H₄):","o":["2","4","5","6"],"a":2,"e":"C₂H₄: 1 C=C (1σ+1π) + 4 C-H σ bonds = 5 σ bonds total.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Bond order of O₂:","o":["1","2","3","0"],"a":1,"e":"O₂: double bond (O=O). Bond order = (bonding-antibonding)/2. O₂ is paramagnetic.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Hybridization of N in NH₃:","o":["sp","sp²","sp³","sp³d"],"a":2,"e":"NH₃: sp³ hybridized N, 3 bond pairs + 1 lone pair → pyramidal. Bond angle 107°.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Lattice energy is energy required to:","o":["Form ionic crystal","Separate ionic crystal into gaseous ions","Break covalent bond","Dissolve ionic compound"],"a":1,"e":"Lattice energy = energy to separate 1 mole of ionic crystal into gaseous ions. Higher lattice energy → more stable crystal.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Which has highest lattice energy?","o":["NaCl","MgO","CaCl₂","KCl"],"a":1,"e":"MgO: Mg²⁺ + O²⁻. Lattice energy ∝ charge/ionic radius. Higher charge → higher lattice energy.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"London dispersion forces are due to:","o":["Permanent dipoles","Temporary (instantaneous) dipoles","Ionic charges","H-bonding"],"a":1,"e":"London forces (van der Waals) = temporary dipoles from electron fluctuations. Weaker than H-bonds.","ch":"Chemical Bonding","tag":"Must Do"},
        {"q":"Law of mass action: for A + B ⇌ C + D, Kc = ","o":["[A][B]/[C][D]","[C][D]/[A][B]","[A][B]×[C][D]","[A+B]/[C+D]"],"a":1,"e":"Kc = [products]/[reactants] = [C][D]/[A][B] at equilibrium.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Le Chatelier's principle states:","o":["Equilibrium is always on right","If disturbed, system shifts to oppose the change","Kc is always 1","Pressure has no effect"],"a":1,"e":"Le Chatelier: when equilibrium disturbed, system shifts to counteract the change.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"For exothermic reaction at equilibrium, increasing temperature:","o":["Shifts equilibrium right","Shifts equilibrium left (reduces yield of products)","No effect","Increases Kc"],"a":1,"e":"Exothermic: increasing T shifts equilibrium left (favors endothermic reverse reaction). Kc decreases.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Increasing pressure on gas equilibrium N₂+3H₂⇌2NH₃ shifts it:","o":["Left","Right (toward fewer moles of gas)","No effect","Depends on temperature"],"a":1,"e":"Increasing P favors side with fewer moles of gas. Left: 1+3=4 mol. Right: 2 mol. Shifts right.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"pH of neutral solution at 25°C:","o":["0","7","14","1"],"a":1,"e":"pH = 7 at 25°C for neutral solution (pure water). pH < 7 = acidic, pH > 7 = basic.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"pH = −log[H⁺]. If [H⁺] = 10⁻³ M, pH = ","o":["3","−3","10","0.001"],"a":0,"e":"pH = -log[H⁺] = -log(10⁻³) = 3.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Ka is:","o":["Equilibrium constant for base","Acid dissociation constant","Kw/Kb","Rate constant"],"a":1,"e":"Ka = acid dissociation constant. Higher Ka → stronger acid. pKa = -log Ka.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Buffer solution resists change in:","o":["Temperature","pH","Concentration","Pressure"],"a":1,"e":"Buffer = solution that resists pH change upon addition of acid or base. e.g. CH₃COOH/CH₃COONa.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Henderson-Hasselbalch equation: pH = ","o":["pKa + log[acid]/[salt]","pKa + log[salt]/[acid]","pKa - log[acid]","log[acid]"],"a":1,"e":"pH = pKa + log([A⁻]/[HA]) = pKa + log([salt]/[acid]).","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Solubility product Ksp of AgCl:","o":["[AgCl]","[Ag⁺][Cl⁻]","[Ag⁺]+[Cl⁻]","[Ag⁺]²[Cl⁻]"],"a":1,"e":"AgCl ⇌ Ag⁺ + Cl⁻. Ksp = [Ag⁺][Cl⁻]. Precipitation if ionic product > Ksp.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Common ion effect suppresses:","o":["Equilibrium","Ionization/solubility of weak electrolyte","Ksp","pH"],"a":1,"e":"Common ion effect: adding common ion suppresses ionization of weak electrolyte. Used in buffer.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Kw (water) = [H⁺][OH⁻] at 25°C = ","o":["10⁻⁷","10⁻¹⁴","10⁻⁷/10⁻⁷","1"],"a":1,"e":"Kw = 10⁻¹⁴ at 25°C. At neutral: [H⁺] = [OH⁻] = 10⁻⁷ M. pH + pOH = 14.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Strong acids are:","o":["HCN, CH₃COOH","HCl, H₂SO₄, HNO₃, HBr, HI, HClO₄","H₂CO₃, H₂SO₃","H₃PO₄"],"a":1,"e":"Strong acids: HCl, HBr, HI, H₂SO₄, HNO₃, HClO₄ — fully dissociate in water.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Bronsted-Lowry acid is a:","o":["Proton acceptor","Proton donor (H⁺ donor)","Electron pair donor","Electron pair acceptor"],"a":1,"e":"Bronsted-Lowry: acid = proton (H⁺) donor. Base = proton acceptor.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Lewis acid is:","o":["Proton donor","Proton acceptor","Electron pair acceptor","Electron pair donor"],"a":2,"e":"Lewis acid = electron pair acceptor. Lewis base = electron pair donor. Broader definition.","ch":"Equilibrium","tag":"Must Do"},
        {"q":"Enthalpy change ΔH for exothermic reaction is:","o":["Positive","Negative (energy released)","Zero","Undefined"],"a":1,"e":"Exothermic: ΔH < 0 (negative). Heat released to surroundings. Combustion, neutralization.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Hess's law states:","o":["Reaction enthalpy depends on path","ΔH is independent of path (state function)","ΔH = 0 always","ΔS = 0"],"a":1,"e":"Hess's law: ΔH is path independent — depends only on initial and final states.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Standard enthalpy of formation (ΔHf°) of element in standard state is:","o":["Positive","Negative","Zero","Variable"],"a":2,"e":"ΔHf° of element in its standard state = 0. e.g. ΔHf°(O₂) = 0, ΔHf°(C graphite) = 0.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Gibbs free energy ΔG = ","o":["ΔH + TΔS","ΔH - TΔS","ΔH × ΔS","ΔH/ΔS"],"a":1,"e":"ΔG = ΔH - TΔS. ΔG < 0 → spontaneous. ΔG > 0 → non-spontaneous. ΔG = 0 → equilibrium.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Entropy (S) increases in:","o":["Freezing","Dissolving salt (solid→ions in solution)","Condensation","Deposition"],"a":1,"e":"Entropy increases: solid→liquid→gas, dissolving, mixing, higher T. Disorder increases.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"First law of thermodynamics: ΔU = ","o":["q + w","q - w","q × w","q/w"],"a":0,"e":"ΔU = q + w. (q = heat absorbed, w = work done ON system). Energy conservation.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Enthalpy H = U + PV. At constant pressure, ΔH = ","o":["ΔU","ΔU + PΔV","ΔU - PΔV","PΔV"],"a":1,"e":"At constant P: ΔH = ΔU + PΔV = q_p (heat at constant pressure).","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Spontaneous process always has:","o":["ΔG > 0","ΔG < 0","ΔG = 0","ΔH < 0"],"a":1,"e":"Spontaneous process: ΔG < 0 at constant T and P. Non-spontaneous: ΔG > 0. Equilibrium: ΔG = 0.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Which process is always spontaneous?","o":["ΔH+, ΔS-","ΔH-, ΔS+ (always)","ΔH+, ΔS+","ΔH-, ΔS-"],"a":1,"e":"ΔG = ΔH - TΔS. When ΔH<0 and ΔS>0: ΔG always negative → always spontaneous.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Bond dissociation energy is energy required to:","o":["Form a bond","Break one mole of bonds in gas phase","Ionize atom","Dissolve compound"],"a":1,"e":"Bond energy = energy to break 1 mole of bonds (gas phase). Stronger bond → higher bond energy.","ch":"Thermodynamics","tag":"Must Do"},
        {"q":"Oxidation is:","o":["Gain of electrons","Loss of electrons (or increase in oxidation state)","Gain of proton","Loss of oxygen"],"a":1,"e":"Oxidation = loss of electrons = increase in oxidation state. Reduction = gain of electrons.","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidation state of O in H₂O:","o":["0","-1","-2","+2"],"a":2,"e":"O in most compounds = -2. Exceptions: O₂(0), H₂O₂(-1), OF₂(+2).","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidation state of Cr in K₂Cr₂O₇:","o":["0","+3","+6","+7"],"a":2,"e":"K₂Cr₂O₇: 2(+1) + 2(Cr) + 7(-2) = 0 → 2Cr = +12 → Cr = +6.","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidation state of Mn in KMnO₄:","o":["+4","+6","+7","+2"],"a":2,"e":"KMnO₄: K(+1) + Mn + 4O(-2) = 0 → Mn = +7. KMnO₄ is strong oxidizing agent.","ch":"Redox","tag":"Must Do"},
        {"q":"Reducing agent:","o":["Gets oxidized (gives electrons)","Gets reduced","Gains oxygen","Loses hydrogen"],"a":0,"e":"Reducing agent: gets oxidized itself (loses electrons / given electrons to oxidizing agent).","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidizing agent:","o":["Gets oxidized","Gets reduced (accepts electrons)","Loses oxygen","Gives hydrogen"],"a":1,"e":"Oxidizing agent: gets reduced itself (gains electrons from reducing agent).","ch":"Redox","tag":"Must Do"},
        {"q":"Disproportionation reaction:","o":["Both oxidation and reduction of same element","Only oxidation","Only reduction","No change in OS"],"a":0,"e":"Disproportionation: same element simultaneously oxidized and reduced. e.g. Cl₂ + NaOH → NaCl + NaOCl.","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidation state of S in H₂SO₄:","o":["+2","+4","+6","-2"],"a":2,"e":"H₂SO₄: 2(+1) + S + 4(-2) = 0 → S = +6.","ch":"Redox","tag":"Must Do"},
        {"q":"Oxidation state of N in HNO₃:","o":["+3","+5","-3","0"],"a":1,"e":"HNO₃: +1 + N + 3(-2) = 0 → N = +5. In NH₃: N = -3. In N₂: N = 0.","ch":"Redox","tag":"Must Do"},
        {"q":"Electrochemical series arranges metals by:","o":["Atomic number","Reducing power (standard electrode potential)","Atomic mass","Reactivity with water"],"a":1,"e":"Electrochemical series: metals in order of standard electrode potential E°. Higher up = better reducing agent.","ch":"Redox","tag":"Must Do"},
        {"q":"Raoult's law states for volatile solvents:","o":["P_solution = x_solvent × P°_solvent","P_solution = P°_solvent","P_solution > P°","P = nRT/V"],"a":0,"e":"Raoult's law: P = x_A × P°_A (for ideal solutions). Vapor pressure proportional to mole fraction.","ch":"Solutions","tag":"Must Do"},
        {"q":"Vapor pressure of solution is _____ pure solvent:","o":["Greater than","Less than (elevation by non-volatile solute)","Equal to","Variable"],"a":1,"e":"Adding non-volatile solute lowers vapor pressure (colligative property).","ch":"Solutions","tag":"Must Do"},
        {"q":"Boiling point elevation ΔTb = ","o":["Kf × m","Kb × m","Kb/m","Kf/m"],"a":1,"e":"ΔTb = Kb × m (molality). Kb for water = 0.52 K·kg/mol. Colligative property.","ch":"Solutions","tag":"Must Do"},
        {"q":"Freezing point depression ΔTf = ","o":["Kf × m","Kb × m","Kf/m","Kf + m"],"a":0,"e":"ΔTf = Kf × m. Kf for water = 1.86 K·kg/mol. Used to find molar mass.","ch":"Solutions","tag":"Must Do"},
        {"q":"Osmotic pressure π = ","o":["nRT/V","CRT (C=molarity)","nR/T","n/VRT"],"a":1,"e":"π = CRT = nRT/V. Van't Hoff equation. Osmosis: solvent moves from low to high concentration.","ch":"Solutions","tag":"Must Do"},
        {"q":"Which colligative property is used to find molar mass of polymer?","o":["Boiling point elevation","Osmotic pressure (most sensitive)","Freezing point depression","Vapor pressure"],"a":1,"e":"Osmotic pressure is most sensitive colligative property — used for large molecules (polymers).","ch":"Solutions","tag":"Must Do"},
        {"q":"Van't Hoff factor i for NaCl in solution:","o":["1","2 (Na⁺ + Cl⁻)","0.5","3"],"a":1,"e":"i = particles after dissociation/particles before. NaCl → Na⁺ + Cl⁻ → i = 2.","ch":"Solutions","tag":"Must Do"},
        {"q":"Henry's law: solubility of gas ∝","o":["Temperature","Partial pressure of gas above solution","Volume","Molarity"],"a":1,"e":"Henry's law: dissolved gas amount ∝ partial pressure above solution. KH × p = concentration.","ch":"Solutions","tag":"Must Do"},
        {"q":"Ideal solution:","o":["Shows positive deviation from Raoult's law","Shows negative deviation","Follows Raoult's law exactly","Has infinite boiling point"],"a":2,"e":"Ideal solution: follows Raoult's law. ΔHmix = 0, ΔVmix = 0. e.g. benzene-toluene.","ch":"Solutions","tag":"Must Do"},
        {"q":"Azeotrope is:","o":["Pure compound","Mixture that boils at constant temperature (same composition as vapor)","Solid mixture","Immiscible mixture"],"a":1,"e":"Azeotrope: mixture that distills without change in composition. Cannot be separated by simple distillation.","ch":"Solutions","tag":"Should Do"},
        {"q":"Cell EMF = E°(cathode) - E°(anode) =","o":["E°red(cathode) - E°red(anode)","E°red(anode) - E°red(cathode)","E°ox + E°red","None"],"a":0,"e":"E°cell = E°red(cathode) - E°red(anode). Positive E°cell → spontaneous. Negative → non-spontaneous.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Faraday's first law of electrolysis:","o":["Mass deposited ∝ current²","Mass deposited ∝ quantity of charge (m = ZQ = ZIt)","Mass = moles","Mass ∝ time only"],"a":1,"e":"Faraday's 1st law: m = ZIt. Z = electrochemical equivalent. m ∝ Q = It.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Faraday's constant F = ","o":["96500 C/mol","96500 J","6.02×10²³","1 A·s"],"a":0,"e":"F = 96500 C/mol = 1 mole of electrons charge. F = NAe = 6.02×10²³ × 1.6×10⁻¹⁹.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Nernst equation: E = E° - (RT/nF)lnQ or at 25°C: E = E° - ","o":["(0.0592/n)lnQ","0.0592lnQ","(nF/RT)lnQ","(RT/nF)×E°"],"a":0,"e":"Nernst: E = E° - (0.0592/n)log Q at 25°C. Used to find cell EMF at non-standard conditions.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"At cathode in electrolysis:","o":["Oxidation occurs","Reduction occurs (cations reduced)","No reaction","Anions go"],"a":1,"e":"Cathode: reduction (gain of electrons). Anode: oxidation (loss of electrons). CathoRed, AnOxide.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Standard hydrogen electrode (SHE) E° = ","o":["1 V","−1 V","0 V (reference)","0.76 V"],"a":2,"e":"SHE = standard hydrogen electrode. E° = 0.000 V by convention. Used as reference.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Kohlrausch's law: conductance at infinite dilution =","o":["Sum of λ⁰ of all ions independently","Product of λ⁰","λ⁰ of cation only","Average of all ions"],"a":0,"e":"Kohlrausch: Λ°m = Σλ⁰cation + Σλ⁰anion. Each ion contributes independently.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Relation between ΔG° and E°cell:","o":["ΔG° = nFE°","ΔG° = −nFE°","ΔG° = nFE°/RT","ΔG° = E°/nF"],"a":1,"e":"ΔG° = -nFE°. Spontaneous (E°>0) means ΔG°<0. n = electrons transferred.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Conductivity of electrolyte solution increases with:","o":["Decreasing concentration (infinite dilution → max)","Increasing concentration always","Decreasing temperature","Increasing viscosity"],"a":0,"e":"Molar conductivity increases with dilution (more ions free to move). At infinite dilution = Λ°m.","ch":"Electrochemistry","tag":"Must Do"},
        {"q":"Periodic law (modern) states properties are periodic function of:","o":["Atomic mass","Atomic number (Moseley)","Atomic radius","Electronegativity"],"a":1,"e":"Modern periodic law (Moseley): properties are periodic function of atomic number.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Ionization energy trend across period (left to right):","o":["Decreases","Increases generally","Stays constant","Random"],"a":1,"e":"IE increases across period (left to right) — smaller size, more nuclear charge, harder to remove e⁻.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Atomic radius trend across period (left to right):","o":["Increases","Decreases (more nuclear charge pulls electrons in)","Stays constant","Random"],"a":1,"e":"Atomic radius decreases across period — increasing nuclear charge without change in shell → electrons pulled in.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Electronegativity trend down a group:","o":["Increases","Decreases (more shielding, larger radius)","Stays constant","Random"],"a":1,"e":"EN decreases down group — larger atoms, more shielding, electrons shared less tightly.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Noble gases are in which group?","o":["Group 1","Group 17","Group 18","Group 16"],"a":2,"e":"Noble gases (He, Ne, Ar, Kr, Xe, Rn) in Group 18. Have complete outermost shell.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Alkali metals are in:","o":["Group 2","Group 1 (Li, Na, K, Rb, Cs, Fr)","Group 17","Group 18"],"a":1,"e":"Alkali metals = Group 1. Lose 1 electron easily. Most reactive metals.","ch":"Periodic Table","tag":"Must Do"},
        {"q":"Halogens are in:","o":["Group 16","Group 17 (F, Cl, Br, I, At)","Group 18","Group 1"],"a":1,"e":"Halogens = Group 17. Most reactive non-metals. Gain 1 electron → -1 ion.","ch":"Periodic Table","tag":"Must Do"},

        const all_questions = [...bio_questions, ...phy_questions, ...chem_questions];

        document.getElementById('stats-display').textContent = `Biology: ${bio_questions.length} | Physics: ${phy_questions.length} | Chemistry: ${chem_questions.length} | Total: ${all_questions.length}`;

        const container = document.getElementById('questions-container');
        let currentFilter = 'all';

        function renderQuestions() {
            container.innerHTML = '';
            
            // Render Biology Header
            const bioHeader = document.createElement('div');
            bioHeader.className = 'section-header';
            bioHeader.dataset.section = 'biology';
            bioHeader.innerHTML = `<h2>Biology Section</h2><p>${bio_questions.length} Questions</p>`;
            container.appendChild(bioHeader);

            all_questions.forEach((q, qIndex) => {
                if (qIndex === bio_questions.length) {
                    // Render Physics Header
                    const phyHeader = document.createElement('div');
                    phyHeader.className = 'section-header';
                    phyHeader.dataset.section = 'physics';
                    phyHeader.innerHTML = `<h2>Physics Section</h2><p>${phy_questions.length} Questions</p>`;
                    container.appendChild(phyHeader);
                }
                
                if (qIndex === bio_questions.length + phy_questions.length) {
                    // Render Chemistry Header
                    const chemHeader = document.createElement('div');
                    chemHeader.className = 'section-header';
                    chemHeader.dataset.section = 'chemistry';
                    chemHeader.innerHTML = `<h2>Chemistry Section</h2><p>${chem_questions.length} Questions</p>`;
                    container.appendChild(chemHeader);
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.dataset.index = qIndex;
                
                let sectionType = 'biology';
                if (qIndex >= bio_questions.length && qIndex < bio_questions.length + phy_questions.length) {
                    sectionType = 'physics';
                } else if (qIndex >= bio_questions.length + phy_questions.length) {
                    sectionType = 'chemistry';
                }
                card.dataset.section = sectionType;

                card.style.animationDelay = `${(qIndex % 10) * 0.05}s`;
                
                const tagClass = q.tag.toLowerCase().includes('must') ? 'tag-must' : 'tag-should';

                let optionsHtml = q.o.map((opt, oIndex) => `
                    <div class="option" data-idx="${oIndex}" onclick="selectAnswer(${qIndex}, ${oIndex}, this)">
                        ${String.fromCharCode(65 + oIndex)}. ${opt}
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="meta-info">
                        <span class="q-number">Question ${qIndex + 1} of ${all_questions.length}</span>
                        <div class="meta-group">
                            <span class="badge chapter">${q.ch}</span>
                            <span class="badge ${tagClass}">${q.tag}</span>
                        </div>
                    </div>
                    <div class="question-text">${q.q}</div>
                    <div class="options" id="options-${qIndex}">
                        ${optionsHtml}
                    </div>
                    <div class="explanation" id="exp-${qIndex}">
                        <div class="explanation-title">Explanation</div>
                        ${q.e}
                    </div>
                `;
                container.appendChild(card);
            });

            applyFilter();
        }

        function applyFilter() {
            const items = container.querySelectorAll('.question-card, .section-header');
            items.forEach(item => {
                if (currentFilter === 'all' || item.dataset.section === currentFilter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.target;
                applyFilter();
            });
        });

        window.selectAnswer = function(qIndex, oIndex, element) {
            const q = all_questions[qIndex];
            const optionsContainer = document.getElementById(`options-${qIndex}`);
            const options = optionsContainer.querySelectorAll('.option');
            const explanation = document.getElementById(`exp-${qIndex}`);
            
            if (options[0].classList.contains('answered')) return; // Already answered
            
            options.forEach(opt => opt.classList.add('answered'));
            
            if (oIndex === q.a) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                options[q.a].classList.add('correct');
            }
            
            explanation.classList.add('visible');
        };

        document.getElementById('reveal-all').addEventListener('click', () => {
            all_questions.forEach((q, qIndex) => {
                const optionsContainer = document.getElementById(`options-${qIndex}`);
                const options = optionsContainer.querySelectorAll('.option');
                const explanation = document.getElementById(`exp-${qIndex}`);
                
                if (!options[0].classList.contains('answered')) {
                    options.forEach(opt => opt.classList.add('answered'));
                    options[q.a].classList.add('correct');
                    explanation.classList.add('visible');
                }
            });
        });

        document.getElementById('reset-all').addEventListener('click', renderQuestions);

        // Initial render
        renderQuestions();
    </script>
</body>
</html>
